<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ಕಾವ್ಯ ಪ್ರವೇಶ</title>
    <!-- Bootstrap CSS via CDN -->
    <link rel="stylesheet" href="/static/boostrap/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/static/css/style.css"/>
    <link rel="stylesheet" href="/static/css/kavya.css"/>
    <!-- jQuery via CDN -->
    <script src="/static/jquery/jquery-3.7.1.min.js"></script>
    <!-- JavaScript -->
    <script src="/static/boostrap/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/kavya_process.js"></script>
    <script src="/static/js/additional-buttons.js"></script>
</head>

<body>
{% include 'navbar.html' %}
<div class="container mt-4">
    <div class="row" style="display: flex; gap: 16px; align-items: center;">
        <div class="dropdown" style="flex: 1;">
            <label for="parvaDropdown" class="form-label" style="display: block; margin-bottom: 8px;">ಪರ್ವ</label>
            <select id="parvaDropdown" class="form-select" style="width: 100%;">
                <option selected>ಪರ್ವ ಆಯ್ಕೆಮಾಡಿ</option>
            </select>
        </div>
        <div class="dropdown" style="flex: 1;">
            <label for="sandhiDropdown" class="form-label" style="display: block; margin-bottom: 8px;">ಸಂಧಿ</label>
            <select id="sandhiDropdown" class="form-select" style="width: 100%;" disabled>
                <option selected>ಸಂಧಿ ಆಯ್ಕೆಮಾಡಿ</option>
            </select>
        </div>
        <div class="dropdown" style="flex: 1;">
            <label for="padyaNumberDropdown" class="form-label" style="display: block; margin-bottom: 8px;">ಪದ್ಯ ಸಂಖ್ಯೆ</label>
            <select id="padyaNumberDropdown" class="form-select" style="width: 100%;" disabled>
                <option selected>ಪದ್ಯ ಸಂಖ್ಯೆಯನ್ನು ಆಯ್ಕೆಮಾಡಿ</option>
            </select>
        </div>
    </div>
    

    <div class="audio-player-container mt-4">
        <div class="audio-player">
            <audio id="audio" controls>
                <source src="" type="audio/mpeg"/>
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>

    <div class="container mt-4" style="padding: 16px;">
        <div class="grid-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px;">
            <div class="grid-item" style="display: flex; flex-direction: column; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background-color: #f9f9f9;">
                <span class="label" style="font-weight: bold; margin-bottom: 8px;">ಪದ್ಯ:</span>
                <div class="padya editable" contenteditable="true" style="min-height: 200px; padding: 16px; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; overflow-y: auto; max-height: 300px; box-sizing: border-box;">1</div>
            </div>
            <div class="grid-item" style="display: flex; flex-direction: column; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background-color: #f9f9f9;">
                <span class="label" style="font-weight: bold; margin-bottom: 8px;">ಪಾಠಾಂತರ:</span>
                <div class="pathantar editable" contenteditable="true" style="min-height: 200px; padding: 16px; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; overflow-y: auto; max-height: 300px; box-sizing: border-box;">2</div>
            </div>
            <div class="grid-item" style="display: flex; flex-direction: column; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background-color: #f9f9f9;">
                <span class="label" style="font-weight: bold; margin-bottom: 8px;">ಗದ್ಯ:</span>
                <div class="gadya editable" contenteditable="true" style="min-height: 200px; padding: 16px; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; overflow-y: auto; max-height: 300px; box-sizing: border-box;">3</div>
            </div>
            <div class="grid-item" style="display: flex; flex-direction: column; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background-color: #f9f9f9;">
                <span class="label" style="font-weight: bold; margin-bottom: 8px;">ಟಿಪ್ಪಣಿ:</span>
                <div class="tippani editable" contenteditable="true" style="min-height: 200px; padding: 16px; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; overflow-y: auto; max-height: 300px; box-sizing: border-box;">4</div>
            </div>
            <div class="grid-item" style="display: flex; flex-direction: column; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background-color: #f9f9f9;">
                <span class="label" style="font-weight: bold; margin-bottom: 8px;">ಅರ್ಥ:</span>
                <div class="artha editable" contenteditable="true" style="min-height: 200px; padding: 16px; border: 1px solid #ccc; border-radius: 4px; background-color: #fff; overflow-y: auto; max-height: 300px; box-sizing: border-box;">5</div>
            </div>
        </div>
    </div>
    
    
    
    <div class="text-center mt-4">
        <button id="updateButton" class="btn btn-success">Update</button>
    </div>
</div>

<script>
    $(document).ready(function () {
        $("#parvaDropdown").change(function () {
            $("#sandhiDropdown").prop("disabled", false);
        });

        $("#sandhiDropdown").change(function () {
            $("#padyaNumberDropdown").prop("disabled", false);
        });

        $("#padyaNumberDropdown").change(function () {
            // Add any required functionality here
        });
    });
document.addEventListener('DOMContentLoaded', () => {
    const parvaDropdown = document.getElementById('parvaDropdown');
    const sandhiDropdown = document.getElementById('sandhiDropdown');
    const padyaNumberDropdown = document.getElementById('padyaNumberDropdown');
    const audioElement = document.getElementById('audio');
    const audioSource = document.querySelector('#audio source');

    // Function to format numbers to two digits
    function formatNumber(number) {
        return number.toString().padStart(2, '0');
    }

    // Function to update the audio source based on dropdown selections
    function updateAudioSource() {
        const parva = formatNumber(parvaDropdown.value);
        const sandhi = formatNumber(sandhiDropdown.value);
        const padya = formatNumber(padyaNumberDropdown.value);

        if (parva && sandhi && padya) {
            const fileName = `${parva}-${sandhi}-${padya}.mp3`;
            audioSource.src = `static/audio/01-aadiparva/${fileName}`;
            audioElement.load(); // Reload audio element with new source
        }
    }

    // Add event listeners to dropdowns
    padyaNumberDropdown.addEventListener('change', updateAudioSource);

});


</script>

{% include 'footer.html' %}

</body>

</html>
