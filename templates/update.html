<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ಕಾವ್ಯ ಪ್ರವೇಶ - ನವೀಕರಿಸಿ</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}" />
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <!-- jQuery -->
    <script src="{{ url_for('static', filename='jquery/jquery-3.7.1.min.js') }}"></script>
    <!-- Bootstrap JS -->
    <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
    <!-- Axios library (MUST load before ES6 modules) -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <!-- Load application modules -->
    <script type="module">
        import { apiClient } from '{{ url_for("static", filename="js/restclient.js") }}';
        import '{{ url_for("static", filename="js/endpoints.js") }}';
        import '{{ url_for("static", filename="js/kavya_process.js") }}';
        import '{{ url_for("static", filename="js/additional-buttons.js") }}';
        
        console.log('[update.html] ✓ All ES6 modules loaded successfully');
    </script>

</head>

<body style="background-color: rgb(240, 221, 188);">
    {% include 'navbar.html' %}

    <div class="container mt-4 p-4" style="
        border-radius: 8px;
        background-color: rgb(253, 243, 207);
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);">

        <!-- Dropdown Section -->
        <div class="row mb-3">
            <div class="col-md-4">
                <label for="parvaDropdown" class="form-label">ಪರ್ವ</label>
                <select id="parvaDropdown" class="form-select">
                    <option selected>ಪರ್ವ ಆಯ್ಕೆಮಾಡಿ</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="sandhiDropdown" class="form-label">ಸಂಧಿ</label>
                <select id="sandhiDropdown" class="form-select" disabled>
                    <option selected>ಸಂಧಿ ಆಯ್ಕೆಮಾಡಿ</option>
                </select>
            </div>
            <div class="col-md-4">
                <label for="padyaNumberDropdown" class="form-label">ಪದ್ಯ ಸಂಖ್ಯೆ</label>
                <select id="padyaNumberDropdown" class="form-select" disabled>
                    <option selected>ಪದ್ಯ ಸಂಖ್ಯೆಯನ್ನು ಆಯ್ಕೆಮಾಡಿ</option>
                </select>
            </div>
        </div>

        <!-- Audio Player Section -->
        <div class="row audio-update align-items-center mb-3">
            <div class="col-md-6">
                <div class="audio-player">
                    <audio id="audio" controls>
                        <source src="" type="audio/mpeg" />
                        Your browser does not support the audio element.
                    </audio>
                </div>
            </div>

            <!-- File Upload -->
            <div class="col-md-6 text-start">
                <input type="file" class="form-control-file" style="margin-left: -10px;">
            </div>
        </div>



        <!-- Editable Grid Section -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="p-3 border rounded" style="background-color: #f9f9f9;">
                    <label class="form-label font-weight-bold">ಪದ್ಯ:</label>
                    <div class="updatepadya editable" contenteditable="true" style="
                        padding: 16px;
                        border: 1px solid #ccc;
                        border-radius: 4px;
                        background-color: #fff;
                        overflow-y: auto;
                        max-height: 300px;">
                        1
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="p-3 border rounded" style="background-color: #f9f9f9;">
                    <label class="form-label font-weight-bold">ಪಾಠಾಂತರ:</label>
                    <div class="pathantar editable" contenteditable="true" style="
                        padding: 16px;
                        border: 1px solid #ccc;
                        border-radius: 4px;
                        background-color: #fff;
                        overflow-y: auto;
                        max-height: 300px;">
                        2
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="p-3 border rounded" style="background-color: #f9f9f9;">
                    <label class="form-label font-weight-bold">ಗದ್ಯ:</label>
                    <div class="gadya editable" contenteditable="true" style="
                        padding: 16px;
                        border: 1px solid #ccc;
                        border-radius: 4px;
                        background-color: #fff;
                        overflow-y: auto;
                        max-height: 300px;">
                        3
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="p-3 border rounded" style="background-color: #f9f9f9;">
                    <label class="form-label font-weight-bold">ಟಿಪ್ಪಣಿ:</label>
                    <div class="tippani editable" contenteditable="true" style="
                        padding: 16px;
                        border: 1px solid #ccc;
                        border-radius: 4px;
                        background-color: #fff;
                        overflow-y: auto;
                        max-height: 300px;">
                        4
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="p-3 border rounded" style="background-color: #f9f9f9;">
                    <label class="form-label font-weight-bold">ಅರ್ಥ:</label>
                    <div class="artha editable" contenteditable="true" style="
                        padding: 16px;
                        border: 1px solid #ccc;
                        border-radius: 4px;
                        background-color: #fff;
                        overflow-y: auto;
                        max-height: 300px;">
                        5
                    </div>
                </div>
            </div>
        </div>



        <!-- Update Button -->
        <div class="text-center">
            <button id="updateButton" class="btn btn-success">Update</button>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            $("#parvaDropdown").change(function () {
                $("#sandhiDropdown").prop("disabled", false);
            });

            $("#sandhiDropdown").change(function () {
                $("#padyaNumberDropdown").prop("disabled", false);
            });

            $("#padyaNumberDropdown").change(function () {
                // Add any required functionality here
            });
        });

        document.addEventListener("DOMContentLoaded", () => {
            const parvaDropdown = document.getElementById("parvaDropdown");
            const sandhiDropdown = document.getElementById("sandhiDropdown");
            const padyaNumberDropdown = document.getElementById("padyaNumberDropdown");
            const audioElement = document.getElementById("audio");
            const audioSource = document.querySelector("#audio source");

            function formatNumber(number) {
                return number.toString().padStart(2, "0");
            }

            function updateAudioSource() {
                const parva = formatNumber(parvaDropdown.value);
                const sandhi = formatNumber(sandhiDropdown.value);
                const padya = formatNumber(padyaNumberDropdown.value);

                if (parva && sandhi && padya) {
                    const fileName = `${parva}-${sandhi}-${padya}.mp3`;
                    audioSource.src = `static/audio/01-aadiparva/${fileName}`;
                    audioElement.load();
                }
            }

            padyaNumberDropdown.addEventListener("change", updateAudioSource);
        });
    </script>

    {% include 'footer.html' %}
</body>

</html>
