<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.15.349/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <style>
        .modal-body {
            max-height: 80vh;
            overflow-y: auto;
        }

        .pdf-container {
            width: 100%;
            height: auto;
            overflow: hidden;
            position: relative;
        }

        .pdf-page {
            width: 100%;
            height: auto;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 20mm;
            box-sizing: border-box;
            overflow: hidden;
            page-break-after: always;
        }

        .page-break {
            display: block;
            page-break-before: always;
        }

        .zoom-controls {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .zoom-controls button {
            margin: 0 5px;
        }

        .scaled-content {
            transform-origin: top left;
        }
    </style>
</head>

<body>
    <div class="container my-5">
        <h1 class="text-center">Document Viewer</h1>
        <div class="text-center">
            <input type="file" id="fileInput" accept=".docx, .pdf" class="form-control my-3">
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="docViewerModal" tabindex="-1" aria-labelledby="docViewerModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="docViewerModalLabel">Document Content</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="contentContainer" class="pdf-container"></div>
                    <div class="zoom-controls">
                        <button class="btn btn-primary" id="zoomOut">Zoom Out</button>
                        <button class="btn btn-primary" id="zoomIn">Zoom In</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <nav aria-label="Page navigation">
                        <ul class="pagination">
                            <li class="page-item">
                                <button class="page-link" id="prevPage">Previous</button>
                            </li>
                            <li class="page-item">
                                <span class="page-link" id="pageInfo"></span>
                            </li>
                            <li class="page-item">
                                <button class="page-link" id="nextPage">Next</button>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 0;
        let pages = [];
        let pdfDoc = null;
        let pageCount = 0;
        let pdfScale = 1;
        let docxScale = 1;

        document.getElementById('fileInput').addEventListener('change', handleFileSelect);

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                if (file.type === 'application/pdf') {
                    handlePdf(file);
                } else if (file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document') {
                    handleDocx(file);
                } else {
                    alert('Unsupported file type. Please upload a PDF or DOCX file.');
                }
            }
        }

        function handlePdf(file) {
            const fileReader = new FileReader();
            fileReader.onload = function () {
                const arrayBuffer = this.result;
                pdfjsLib.getDocument(arrayBuffer).promise.then(pdf => {
                    pdfDoc = pdf;
                    pageCount = pdf.numPages;
                    currentPage = 0;
                    showPdfPage(currentPage);
                    new bootstrap.Modal(document.getElementById('docViewerModal')).show();
                }).catch(handleError);
            };
            fileReader.readAsArrayBuffer(file);
        }

        function handleDocx(file) {
            const fileReader = new FileReader();
            fileReader.onload = function () {
                const arrayBuffer = this.result;
                mammoth.convertToHtml({ arrayBuffer: arrayBuffer })
                    .then(displayDocxContent)
                    .catch(handleError);
            };
            fileReader.readAsArrayBuffer(file);
        }

        function displayDocxContent(result) {
            const fullText = result.value;
            pages = paginateText(fullText);
            currentPage = 0;
            showDocxPage(currentPage);
            new bootstrap.Modal(document.getElementById('docViewerModal')).show();
        }

        function paginateText(text) {
            const container = document.createElement('div');
            container.style.width = '210mm';
            container.style.height = '297mm';
            container.style.padding = '20mm';
            container.style.boxSizing = 'border-box';
            container.style.position = 'absolute';
            container.style.top = '-9999px';
            container.style.left = '-9999px';
            document.body.appendChild(container);

            let pages = [];
            let currentPageText = '';
            let lines = text.split('\n');

            lines.forEach(line => {
                let testPageText = currentPageText + line + '\n';
                container.innerText = testPageText;
                if (container.scrollHeight > container.clientHeight) {
                    pages.push(currentPageText.trim());
                    currentPageText = line + '\n';
                } else {
                    currentPageText += line + '\n';
                }
            });

            if (currentPageText.trim().length > 0) {
                pages.push(currentPageText.trim());
            }

            document.body.removeChild(container);
            return pages;
        }

        function showPdfPage(pageIndex) {
            pdfDoc.getPage(pageIndex + 1).then(page => {
                const viewport = page.getViewport({ scale: pdfScale });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                document.getElementById('contentContainer').innerHTML = '';
                document.getElementById('contentContainer').appendChild(canvas);
                page.render({ canvasContext: context, viewport: viewport }).promise.then(() => {
                    document.getElementById('pageInfo').innerText = `Page ${pageIndex + 1} of ${pageCount}`;
                    document.getElementById('prevPage').disabled = pageIndex === 0;
                    document.getElementById('nextPage').disabled = pageIndex === pageCount - 1;
                });
            });
        }

        function showDocxPage(pageIndex) {
            const contentDiv = document.getElementById('contentContainer');
            contentDiv.innerHTML = '';
            const pageElement = document.createElement('div');
            pageElement.className = 'page scaled-content';
            pageElement.innerHTML = pages[pageIndex];
            pageElement.style.transform = `scale(${docxScale})`;
            contentDiv.appendChild(pageElement);
            document.getElementById('pageInfo').innerText = `Page ${pageIndex + 1} of ${pages.length}`;
            document.getElementById('prevPage').disabled = pageIndex === 0;
            document.getElementById('nextPage').disabled = pageIndex === pages.length - 1;
        }

        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 0) {
                currentPage--;
                if (pdfDoc) {
                    showPdfPage(currentPage);
                } else {
                    showDocxPage(currentPage);
                }
            }
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            if (currentPage < (pdfDoc ? pageCount - 1 : pages.length - 1)) {
                currentPage++;
                if (pdfDoc) {
                    showPdfPage(currentPage);
                } else {
                    showDocxPage(currentPage);
                }
            }
        });

        document.getElementById('zoomIn').addEventListener('click', () => {
            if (pdfDoc) {
                pdfScale *= 1.2;
                showPdfPage(currentPage);
            } else {
                docxScale *= 1.2;
                showDocxPage(currentPage);
            }
        });

        document.getElementById('zoomOut').addEventListener('click', () => {
            if (pdfDoc) {
                pdfScale /= 1.2;
                showPdfPage(currentPage);
            } else {
                docxScale /= 1.2;
                showDocxPage(currentPage);
            }
        });

        function handleError(error) {
            console.error('Error:', error);
            alert('An error occurred while processing the file.');
        }
    </script>
</body>

</html>
