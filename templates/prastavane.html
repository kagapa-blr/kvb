<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOCX Viewer with Pagination</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        .container {
            width: 80%;
            margin: 50px auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #fileInput {
            margin-bottom: 20px;
        }

        #progressContainer {
            display: none;
            margin-bottom: 20px;
        }

        #docxContent {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 10px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .pagination {
            text-align: center;
            margin-top: 20px;
        }

        .pagination button {
            margin: 0 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <input type="file" id="fileInput" class="form-control" accept=".docx"/>
    <div id="progressContainer" class="progress">
        <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0"
             aria-valuemin="0" aria-valuemax="100"></div>
    </div>
    <div id="docxContent"></div>
    <div class="pagination">
        <button id="prevPage" class="btn btn-primary">Previous</button>
        <span id="pageInfo"></span>
        <button id="nextPage" class="btn btn-primary">Next</button>
    </div>
</div>
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
<!-- Mammoth.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
<script>
    $(document).ready(function() {
        let currentPage = 1;
        let totalPages = 0;
        const charsPerPage = 1500; // Approximate number of characters per page

        $('#fileInput').on('change', function(event) {
            const file = event.target.files[0];
            if (file && file.name.endsWith('.docx')) {
                const reader = new FileReader();
                reader.onloadstart = function() {
                    $('#progressContainer').show();
                    $('#progressBar').css('width', '0%').attr('aria-valuenow', '0');
                };
                reader.onprogress = function(event) {
                    if (event.lengthComputable) {
                        const percentLoaded = Math.round((event.loaded / event.total) * 100);
                        $('#progressBar').css('width', percentLoaded + '%').attr('aria-valuenow', percentLoaded);
                    }
                };
                reader.onload = function(event) {
                    const arrayBuffer = event.target.result;
                    renderDocx(arrayBuffer);
                    $('#progressContainer').hide();
                };
                reader.readAsArrayBuffer(file);
            } else {
                alert('Please upload a DOCX file.');
            }
        });

        async function renderDocx(arrayBuffer) {
            mammoth.convertToHtml({arrayBuffer: arrayBuffer})
                .then(displayResult)
                .catch(handleError);
        }

        function displayResult(result) {
            const docxContent = $('#docxContent');
            docxContent.html('');
            const htmlContent = result.value;

            // Splitting content into pages manually
            const pages = splitIntoPages(htmlContent);
            totalPages = pages.length;
            pages.forEach((page, index) => {
                const pageDiv = $('<div></div>').addClass('page').html(page);
                if (index === 0) {
                    pageDiv.addClass('active');
                }
                docxContent.append(pageDiv);
            });
            updatePagination();
        }

        function handleError(err) {
            console.error(err);
            alert('Error processing the DOCX file.');
        }

        function splitIntoPages(content) {
            const pages = [];
            let currentIndex = 0;

            while (currentIndex < content.length) {
                let endIndex = currentIndex + charsPerPage;
                if (endIndex > content.length) {
                    endIndex = content.length;
                }
                pages.push(content.substring(currentIndex, endIndex));
                currentIndex = endIndex;
            }

            return pages;
        }

        function updatePagination() {
            $('#pageInfo').text(`Page ${currentPage} of ${totalPages}`);
            $('.page').removeClass('active');
            $('.page').eq(currentPage - 1).addClass('active');
        }

        $('#prevPage').on('click', function() {
            if (currentPage > 1) {
                currentPage--;
                updatePagination();
            }
        });

        $('#nextPage').on('click', function() {
            if (currentPage < totalPages) {
                currentPage++;
                updatePagination();
            }
        });
    });
</script>
</body>
</html>
