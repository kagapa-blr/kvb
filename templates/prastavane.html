<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOCX Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <style>
        .modal-body {
            max-height: 80vh;
            overflow-y: auto;
        }

        .pagination {
            justify-content: center;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 20mm;
            box-sizing: border-box;
            overflow: hidden;
            page-break-after: always;
        }

        .page-break {
            display: block;
            page-break-before: always;
        }
    </style>
</head>

<body>
    <div class="container my-5">
        <h1 class="text-center">DOCX Viewer with Pagination</h1>
        <div class="text-center">
            <input type="file" id="fileInput" accept=".docx" class="form-control my-3">
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="docxModal" tabindex="-1" aria-labelledby="docxModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="docxModalLabel">DOCX Content</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="docxContent"></div>
                </div>
                <div class="modal-footer">
                    <nav aria-label="Page navigation">
                        <ul class="pagination">
                            <li class="page-item">
                                <button class="page-link" id="prevPage">Previous</button>
                            </li>
                            <li class="page-item">
                                <span class="page-link" id="pageInfo"></span>
                            </li>
                            <li class="page-item">
                                <button class="page-link" id="nextPage">Next</button>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentPage = 0;
        let pages = [];

        document.getElementById('fileInput').addEventListener('change', handleFileSelect);

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (event) {
                    const arrayBuffer = event.target.result;
                    mammoth.extractRawText({ arrayBuffer: arrayBuffer })
                        .then(displayDocxContent)
                        .catch(handleError);
                };
                reader.readAsArrayBuffer(file);
            }
        }

        function displayDocxContent(result) {
            const fullText = result.value;
            pages = paginateText(fullText);
            currentPage = 0;
            showPage(currentPage);
            new bootstrap.Modal(document.getElementById('docxModal')).show();
        }

        function paginateText(text) {
            const container = document.createElement('div');
            container.style.width = '210mm';
            container.style.height = '297mm';
            container.style.padding = '20mm';
            container.style.boxSizing = 'border-box';
            container.style.position = 'absolute';
            container.style.top = '-9999px';
            container.style.left = '-9999px';
            document.body.appendChild(container);

            let pages = [];
            let currentPageText = '';
            let lines = text.split('\n');

            lines.forEach(line => {
                let testPageText = currentPageText + line + '\n';
                container.innerText = testPageText;
                if (container.scrollHeight > container.clientHeight) {
                    pages.push(currentPageText.trim());
                    currentPageText = line + '\n';
                } else {
                    currentPageText += line + '\n';
                }
            });

            if (currentPageText.trim().length > 0) {
                pages.push(currentPageText.trim());
            }

            document.body.removeChild(container);
            return pages;
        }

        function showPage(pageIndex) {
            const contentDiv = document.getElementById('docxContent');
            contentDiv.innerHTML = '';
            const pageElement = document.createElement('div');
            pageElement.className = 'page';
            pageElement.innerText = pages[pageIndex];
            contentDiv.appendChild(pageElement);
            document.getElementById('pageInfo').innerText = `Page ${pageIndex + 1} of ${pages.length}`;
            document.getElementById('prevPage').disabled = pageIndex === 0;
            document.getElementById('nextPage').disabled = pageIndex === pages.length - 1;
        }

        document.getElementById('prevPage').addEventListener('click', () => {
            if (currentPage > 0) {
                currentPage--;
                showPage(currentPage);
            }
        });

        document.getElementById('nextPage').addEventListener('click', () => {
            if (currentPage < pages.length - 1) {
                currentPage++;
                showPage(currentPage);
            }
        });

        function handleError(error) {
            console.error('Error reading DOCX file:', error);
            alert('Error reading DOCX file. Please try again.');
        }
    </script>
</body>

</html>
