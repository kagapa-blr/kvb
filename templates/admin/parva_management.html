<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Parva Management</title>
    
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
</head>

<body class="bg-light">
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2>Parva Management</h2>
            <button class="btn btn-success" id="addParvaBtn">
                <i class="bi bi-plus-circle"></i> Add Parva
            </button>
        </div>

        <div id="message"></div>

        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Parva Number</th>
                            <th>Parva Name</th>
                            <th style="width: 150px">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="parvaTable">
                        <tr>
                            <td colspan="3" class="text-center py-4 text-muted">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- CREATE / UPDATE MODAL -->
    <div class="modal fade" id="parvaModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Create Parva</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="parva_id" />
                    
                    <div class="mb-3">
                        <label class="form-label">Parva Name <span class="text-danger">*</span></label>
                        <input type="text" id="parva_name" class="form-control" required />
                        <div class="invalid-feedback">Parva name is required</div>
                    </div>

                    <div class="mb-3" id="numberGroup">
                        <label class="form-label">Parva Number</label>
                        <input type="number" id="parva_number" class="form-control" />
                        <div class="form-text">Leave empty for auto-generation</div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="saveParvaBtn">
                        <span class="spinner-border spinner-border-sm me-2 d-none" id="saveSpinner"></span>
                        <i class="bi bi-save"></i> Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- DELETE CONFIRM MODAL -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-exclamation-triangle"></i> Confirm Delete
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="deleteConfirmMsg">
                    Are you sure you want to delete this Parva?
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
                        <span class="spinner-border spinner-border-sm me-2 d-none" id="deleteSpinner"></span>
                        <i class="bi bi-trash"></i> Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- JS ORDER -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/cdn/axios.min.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='js/parva_manager.js') }}"></script>
</body>
</html>
