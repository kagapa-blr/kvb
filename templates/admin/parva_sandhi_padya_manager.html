<!doctype html>
<html lang="kn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ಕುಮಾರವ್ಯಾಸ ಭಾರತ - ನಿರ್ವಹಣೆ</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Noto Sans Kannada", sans-serif;
        background-color: #f8f9fa;
      }
      .header-bg {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .content-card {
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        border-radius: 15px;
        border: none;
      }
      .table-hover tbody tr:hover {
        background-color: rgba(0, 123, 255, 0.075);
      }
      .form-control,
      .form-select {
        font-size: 0.95rem;
      }
      .table th {
        font-weight: 600;
        border-top: none;
      }
      .empty-state {
        text-align: center;
        padding: 3rem;
        color: #6c757d;
      }
      .error-state {
        text-align: center;
        padding: 2rem;
        color: #dc3545;
        background: #f8d7da;
        border-radius: 8px;
        border: 1px solid #f5c6cb;
      }
      .success-message {
        background: #d4edda;
        border: 1px solid #c3e6cb;
        color: #155724;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1rem;
      }
      @media (max-width: 768px) {
        .display-5 {
          font-size: 2rem;
        }
        .lead {
          font-size: 1.1rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container-fluid py-4">
      <!-- HEADER -->
      <div class="card content-card header-bg text-white mb-4">
        <div class="card-body text-center py-5">
          <h1 class="display-5 fw-bold mb-3">ಕುಮಾರವ್ಯಾಸ ಭಾರತ</h1>
          <p class="lead mb-0">ಡೇಟಾಬೇಸ್ ನಿರ್ವಹಣೆ</p>
        </div>
      </div>

      <!-- ALERT CONTAINER -->
      <div id="alertContainer" class="container-fluid mb-4"></div>

      <!-- TABS -->
      <ul class="nav nav-tabs nav-fill mb-4 content-card px-3 py-2">
        <li class="nav-item">
          <button
            class="nav-link active px-4 py-3"
            data-bs-toggle="tab"
            data-bs-target="#parva_tab"
          >
            <i class="bi bi-book me-1"></i> ಪರ್ವಗಳು
          </button>
        </li>
        <li class="nav-item">
          <button
            class="nav-link px-4 py-3"
            data-bs-toggle="tab"
            data-bs-target="#sandhi_tab"
          >
            <i class="bi bi-journal-text me-1"></i> ಸಂಧಿಗಳು
          </button>
        </li>
        <li class="nav-item">
          <button
            class="nav-link px-4 py-3"
            data-bs-toggle="tab"
            data-bs-target="#padya_tab"
          >
            <i class="bi bi-file-earmark-text me-1"></i> ಪದ್ಯಗಳು
          </button>
        </li>
      </ul>

      <div class="tab-content content-card p-4">
        <!-- PARVA TAB -->
        <div class="tab-pane fade show active" id="parva_tab">
          <div class="row g-3 mb-4 align-items-end">
            <div class="col-lg-9 col-md-8">
              <label class="form-label fw-semibold"
                >ಪರ್ವ ಹೆಸರು <span class="text-danger">*</span></label
              >
              <input
                id="parva_name"
                class="form-control"
                placeholder="ಪರ್ವ ಹೆಸರನ್ನು ನಮೂದಿಸಿ..."
              />
            </div>
            <div class="col-lg-3 col-md-4">
              <button
                class="btn btn-success w-100 h-100"
                onclick="createParva()"
              >
                <i class="bi bi-plus-circle me-1"></i> ಹೊಸ ಪರ್ವ ಸೇರಿಸಿ
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-hover">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>ಹೆಸರು</th>
                  <th>ಅಂಕ</th>
                  <th>ಸಂಧಿಗಳು</th>
                  <th style="width: 120px">ಕಾರ್ಯಗಳು</th>
                </tr>
              </thead>
              <tbody id="parva_table">
                <tr>
                  <td colspan="5" class="empty-state">
                    <div
                      class="spinner-border spinner-border-sm me-2"
                      role="status"
                    ></div>
                    ಲೋಡ್ ಆಗುತ್ತಿದೆ...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- SANDHI TAB -->
        <div class="tab-pane fade" id="sandhi_tab">
          <div class="row g-3 mb-4 align-items-end">
            <div class="col-lg-4 col-md-4">
              <label class="form-label fw-semibold"
                >ಪರ್ವ <span class="text-danger">*</span></label
              >
              <select
                id="sandhi_parva_select"
                class="form-select"
                onchange="loadSandhisByParva()"
              >
                <option value="">ಪರ್ವ ಆಯ್ಕೆಮಾಡಿ</option>
              </select>
            </div>
            <div class="col-lg-6 col-md-6">
              <label class="form-label fw-semibold"
                >ಸಂಧಿ ಹೆಸರು <span class="text-danger">*</span></label
              >
              <input
                id="sandhi_name"
                class="form-control"
                placeholder="ಸಂಧಿ ಹೆಸರನ್ನು ನಮೂದಿಸಿ..."
              />
            </div>
            <div class="col-lg-2 col-md-2">
              <button
                class="btn btn-success w-100 h-100"
                onclick="createSandhi()"
              >
                <i class="bi bi-plus-circle me-1"></i> ಹೊಸ ಸಂಧಿ ಸೇರಿಸಿ
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-hover">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>ಸಂಧಿ</th>
                  <th>ಅಂಕ</th>
                  <th>ಪದ್ಯಗಳು</th>
                  <th style="width: 120px">ಕಾರ್ಯಗಳು</th>
                </tr>
              </thead>
              <tbody id="sandhi_table">
                <tr>
                  <td colspan="5" class="empty-state">
                    <i class="bi bi-book me-2"></i>ಪರ್ವ ಆಯ್ಕೆಮಾಡಿ
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- PADYA TAB -->
        <div class="tab-pane fade" id="padya_tab">
          <div class="row g-3 mb-4">
            <div class="col-lg-3 col-md-6">
              <label class="form-label fw-semibold"
                >ಪರ್ವ <span class="text-danger">*</span></label
              >
              <select
                id="padya_parva_select"
                class="form-select"
                onchange="loadSandhiOptions()"
              >
                <option value="">ಪರ್ವ ಆಯ್ಕೆಮಾಡಿ</option>
              </select>
            </div>
            <div class="col-lg-3 col-md-6">
              <label class="form-label fw-semibold"
                >ಸಂಧಿ <span class="text-danger">*</span></label
              >
              <select
                id="padya_sandhi_select"
                class="form-select"
                onchange="loadPadyaList()"
              >
                <option value="">ಸಂಧಿ ಆಯ್ಕೆಮಾಡಿ</option>
              </select>
            </div>
            <div class="col-lg-2 col-md-6">
              <label class="form-label fw-semibold"
                >ಪದ್ಯ ಸಂಖ್ಯೆ <span class="text-danger">*</span></label
              >
              <input
                id="padya_number"
                type="number"
                class="form-control"
                placeholder="ಅಂಕ"
              />
            </div>
            <div class="col-lg-4 col-md-6">
              <label class="form-label fw-semibold"
                >ಪದ್ಯ <span class="text-danger">*</span></label
              >
              <textarea
                id="padya_text"
                class="form-control"
                rows="3"
                placeholder="ಪದ್ಯ ನಮೂದಿಸಿ..."
              ></textarea>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-12">
              <button
                class="btn btn-success btn-lg px-5 py-2"
                onclick="createPadya()"
              >
                <i class="bi bi-plus-circle me-2"></i> ಹೊಸ ಪದ್ಯ ಸೇರಿಸಿ
              </button>
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-hover">
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>ಅಂಕ</th>
                  <th>ಪದ್ಯ</th>
                  <th style="width: 150px">ಕಾರ್ಯಗಳು</th>
                </tr>
              </thead>
              <tbody id="padya_table">
                <tr>
                  <td colspan="4" class="empty-state">
                    <i class="bi bi-file-earmark-text me-2"></i>ಸಂಧಿ ಆಯ್ಕೆಮಾಡಿ
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- PADYA EDIT MODAL -->
    <div class="modal fade" id="padyaModal" tabindex="-1">
      <div class="modal-dialog modal-xl">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">
              <i class="bi bi-pencil-square me-2"></i>ಪದ್ಯ ಸಂಪಾದಿಸಿ
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input id="edit_parva_number" type="hidden" />
            <input id="edit_sandhi_number" type="hidden" />

            <div class="row g-3 mb-3">
              <div class="col-md-3">
                <label class="form-label fw-semibold"
                  >ಪದ್ಯ ಸಂಖ್ಯೆ <span class="text-danger">*</span></label
                >
                <input
                  id="edit_padya_number"
                  type="number"
                  class="form-control"
                />
              </div>
              <div class="col-md-9">
                <label class="form-label fw-semibold"
                  >ಪದ್ಯ <span class="text-danger">*</span></label
                >
                <textarea
                  id="edit_padya_text"
                  class="form-control"
                  rows="3"
                ></textarea>
              </div>
            </div>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">ಗದ್ಯ</label>
                <textarea
                  id="edit_gadya"
                  class="form-control"
                  rows="4"
                  placeholder="ಗದ್ಯ ನಮೂದಿಸಿ..."
                ></textarea>
              </div>
              <div class="col-md-6">
                <label class="form-label fw-semibold">ಟಿಪ್ಪಣಿ</label>
                <textarea
                  id="edit_tippani"
                  class="form-control"
                  rows="4"
                  placeholder="ಟಿಪ್ಪಣಿ ನಮೂದಿಸಿ..."
                ></textarea>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              ರದ್ದುಮಾಡಿ
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="updatePadya()"
            >
              <i class="bi bi-save me-1"></i> ಸುಧಾರಿಸಿ
            </button>
            <button
              type="button"
              class="btn btn-danger"
              onclick="confirmDeletePadya()"
            >
              <i class="bi bi-trash me-1"></i> ಅಳಿಸಿ
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- DELETE CONFIRM MODAL -->
    <div class="modal fade" id="deleteConfirmModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title">
              <i class="bi bi-exclamation-triangle me-2"></i> ದೃಢೀಕರಣ
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p class="mb-0">
              ಈ ದಾಖಲೆಯನ್ನು ಅಳಿಸಲಾಗುತ್ತದೆ. ನೀವು ಖಂಡಿತವಾಗಿ ಮುಂದುವರೆಯಲು ಬಯಸುವಿರಾ?
            </p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              ರದ್ದು
            </button>
            <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
              ಅಳಿಸಿ
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const API_BASE = "/api/v1";
      let deleteAction = null;
      let currentTab = "parva_tab";

      const padyaModal = new bootstrap.Modal(
        document.getElementById("padyaModal"),
      );
      const deleteModal = new bootstrap.Modal(
        document.getElementById("deleteConfirmModal"),
      );

      // UI Helpers
      function showAlert(message, type = "danger") {
        const container = document.getElementById("alertContainer");
        const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    <i class="bi bi-${type === "success" ? "check-circle" : "exclamation-triangle"}-fill me-2"></i>
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        container.innerHTML = alertHtml;
        setTimeout(() => {
          const alert = container.querySelector(".alert");
          if (alert) alert.remove();
        }, 5000);
      }

      function showLoading(tableId) {
        document.getElementById(tableId).innerHTML =
          '<tr><td colspan="5" class="empty-state"><div class="spinner-border spinner-border-sm me-2" role="status"></div>ಲೋಡ್ ಆಗುತ್ತಿದೆ...</td></tr>';
      }

      function showEmpty(tableId, message = "ಡೇಟಾ ಇಲ್ಲ") {
        document.getElementById(tableId).innerHTML =
          `<tr><td colspan="5" class="empty-state"><i class="bi bi-inbox fs-1 mb-3 d-block"></i>${message}</td></tr>`;
      }

      function showError(tableId, message = "ಬಿಡ್ಡು ಘಟನೆ") {
        document.getElementById(tableId).innerHTML =
          `<tr><td colspan="5" class="error-state"><i class="bi bi-exclamation-triangle-fill me-2"></i>${message}</td></tr>`;
      }

      // API Helper - Matches backend exactly
      async function apiRequest(endpoint, options = {}) {
        try {
          const response = await fetch(`${API_BASE}${endpoint}`, {
            headers: {
              "Content-Type": "application/json",
              ...options.headers,
            },
            ...options,
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(errorData.error || `HTTP ${response.status}`);
          }

          const result = await response.json();
          // Ensure data is always an array to prevent map errors
          return {
            data: Array.isArray(result) ? result : (result.data || []),
            count: result.count || 0
          };
        } catch (error) {
          console.error(`API Error ${endpoint}:`, error);
          throw error;
        }
      }

      // ================= PARVA =================
      async function loadParvas() {
        try {
          showLoading("parva_table");
          const result = await apiRequest("/parva?offset=0&limit=100");
          const data = result.data || [];

          const tbody = document.getElementById("parva_table");
          if (!data || data.length === 0) {
            showEmpty("parva_table", "ಪರ್ವಗಳು ಇಲ್ಲ");
          } else {
            tbody.innerHTML = data
              .map((p) => `
                    <tr>
                        <td>${p.id || ""}</td>
                        <td class="fw-semibold">${p.name || ""}</td>
                        <td>${p.parva_number || ""}</td>
                        <td><span class="badge bg-primary">${p.sandhi_count || 0}</span></td>
                        <td>
                            <div class="btn-group" role="group">
                                <button class="btn btn-outline-danger btn-sm" onclick="deleteParva(${p.parva_number || 0})" title="ಅಳಿಸಿ">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `)
              .join("");
          }
          fillParvaDropdown(data);
        } catch (error) {
          showError("parva_table", error.message);
          showAlert(
            `ಪರ್ವಗಳನ್ನು ಲೋಡ್ ಮಾಡಲು ಸಾಧ್ಯವಿಲ್ಲ: ${error.message}`,
            "danger",
          );
        }
      }

      async function createParva() {
        const name = document.getElementById("parva_name").value.trim();
        if (!name) {
          showAlert("ಪರ್ವ ಹೆಸರು ನಮೂದಿಸಿ", "warning");
          return;
        }

        try {
          await apiRequest("/parva", {
            method: "POST",
            body: JSON.stringify({ name }),
          });
          document.getElementById("parva_name").value = "";
          showAlert("ಹೊಸ ಪರ್ವ ಸೇರಿಸಲ್ಪಟ್ಟಿದೆ ✅", "success");
          loadParvas();
        } catch (error) {
          showAlert(`ಪರ್ವ ಸೇರಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ: ${error.message}`, "danger");
        }
      }

      async function deleteParva(parva_number) {
        deleteAction = async () => {
          try {
            await apiRequest(`/parva/${parva_number}`, { method: "DELETE" });
            showAlert("ಪರ್ವ ಅಳಿಸಲ್ಪಟ್ಟಿದೆ ✅", "success");
            loadParvas();
          } catch (error) {
            showAlert(`ಅಳಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ: ${error.message}`, "danger");
          }
        };
        deleteModal.show();
      }

      // ================= SANDHI =================
      function fillParvaDropdown(data) {
        const selects = ["sandhi_parva_select", "padya_parva_select"];
        selects.forEach((id) => {
          const el = document.getElementById(id);
          el.innerHTML =
            '<option value="">ಪರ್ವ ಆಯ್ಕೆಮಾಡಿ</option>' +
            (data || [])
              .map(
                (p) => `<option value="${p.parva_number || ''}">${p.name || ''}</option>`,
              )
              .join("");
        });
      }

      async function loadSandhisByParva() {
        const parva_number = document.getElementById(
          "sandhi_parva_select",
        ).value;
        if (!parva_number) {
          showEmpty("sandhi_table", "ಪರ್ವ ಆಯ್ಕೆಮಾಡಿ");
          return;
        }

        try {
          showLoading("sandhi_table");
          const result = await apiRequest(
            `/sandhi/by_parva/${parva_number}?offset=0&limit=100`,
          );
          const data = result.data || [];

          const tbody = document.getElementById("sandhi_table");
          if (!data || data.length === 0) {
            showEmpty("sandhi_table", "ಸಂಧಿಗಳು ಇಲ್ಲ");
          } else {
            tbody.innerHTML = data
              .map(
                (s) => `
                    <tr>
                        <td>${s.id || ''}</td>
                        <td class="fw-semibold">${s.name || ''}</td>
                        <td>${s.sandhi_number || ''}</td>
                        <td><span class="badge bg-success">${s.padya_count || 0}</span></td>
                        <td>
                            <button class="btn btn-outline-danger btn-sm" onclick="deleteSandhi(${parva_number}, ${s.sandhi_number || 0})" title="ಅಳಿಸಿ">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `,
              )
              .join("");
          }
          fillSandhiDropdown(data);
        } catch (error) {
          showError("sandhi_table", error.message);
        }
      }

      function fillSandhiDropdown(data) {
        const el = document.getElementById("padya_sandhi_select");
        el.innerHTML =
          '<option value="">ಸಂಧಿ ಆಯ್ಕೆಮಾಡಿ</option>' +
          (data || [])
            .map((s) => `<option value="${s.sandhi_number || ''}">${s.name || ''}</option>`)
            .join("");
      }

      async function createSandhi() {
        const parva_number = document.getElementById(
          "sandhi_parva_select",
        ).value;
        const name = document.getElementById("sandhi_name").value.trim();

        if (!parva_number || !name) {
          showAlert("ಪರ್ವ ಮತ್ತು ಸಂಧಿ ಹೆಸರು ನಮೂದಿಸಿ", "warning");
          return;
        }

        try {
          await apiRequest("/sandhi", {
            method: "POST",
            body: JSON.stringify({
              parva_number: parseInt(parva_number),
              name,
            }),
          });
          document.getElementById("sandhi_name").value = "";
          showAlert("ಹೊಸ ಸಂಧಿ ಸೇರಿಸಲ್ಪಟ್ಟಿದೆ ✅", "success");
          loadSandhisByParva();
        } catch (error) {
          showAlert(`ಸಂಧಿ ಸೇರಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ: ${error.message}`, "danger");
        }
      }

      async function deleteSandhi(parva_number, sandhi_number) {
        deleteAction = async () => {
          try {
            await apiRequest(`/sandhi/${parva_number}/${sandhi_number}`, {
              method: "DELETE",
            });
            showAlert("ಸಂಧಿ ಅಳಿಸಲ್ಪಟ್ಟಿದೆ ✅", "success");
            loadSandhisByParva();
          } catch (error) {
            showAlert(`ಅಳಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ: ${error.message}`, "danger");
          }
        };
        deleteModal.show();
      }

      // ================= PADYA =================
      async function loadSandhiOptions() {
        const parva_number =
          document.getElementById("padya_parva_select").value;
        if (!parva_number) return;

        try {
          const result = await apiRequest(
            `/sandhi/by_parva/${parva_number}?offset=0&limit=100`,
          );
          fillSandhiDropdown(result.data || []);
        } catch (error) {
          console.error("loadSandhiOptions failed:", error);
        }
      }

      async function loadPadyaList() {
        const parva_number =
          document.getElementById("padya_parva_select").value;
        const sandhi_number = document.getElementById(
          "padya_sandhi_select",
        ).value;

        if (!parva_number || !sandhi_number) {
          showEmpty("padya_table", "ಸಂಧಿ ಆಯ್ಕೆಮಾಡಿ");
          return;
        }

        try {
          showLoading("padya_table");
          const result = await apiRequest(
            `/padya/search?parva_number=${parva_number}&sandhi_number=${sandhi_number}&offset=0&limit=100`,
          );
          const data = result.data || [];

          const tbody = document.getElementById("padya_table");
          if (!data || data.length === 0) {
            showEmpty("padya_table", "ಪದ್ಯಗಳು ಇಲ್ಲ");
          } else {
            tbody.innerHTML = data
              .map(
                (row) => `
                    <tr>
                        <td>${row.id || ''}</td>
                        <td><strong>${row.padya_number || ''}</strong></td>
                        <td class="text-break">${row.padya || ""}</td>
                        <td>
                            <div class="btn-group" role="group">
                                <button class="btn btn-outline-primary btn-sm me-1" onclick="editPadya(${parva_number}, ${sandhi_number}, ${row.padya_number || 0})" title="ಸಂಪಾದಿಸಿ">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-outline-danger btn-sm" onclick="deletePadya(${parva_number}, ${sandhi_number}, ${row.padya_number || 0})" title="ಅಳಿಸಿ">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `,
              )
              .join("");
          }
        } catch (error) {
          showError("padya_table", error.message);
        }
      }

      async function createPadya() {
        const parva_number = parseInt(
          document.getElementById("padya_parva_select").value,
        );
        const sandhi_number = parseInt(
          document.getElementById("padya_sandhi_select").value,
        );
        const padya_number = parseInt(
          document.getElementById("padya_number").value,
        );
        const padya = document.getElementById("padya_text").value.trim();

        if (!parva_number || !sandhi_number || !padya_number || !padya) {
          showAlert("ಎಲ್ಲಾ ಕ್ಷೇತ್ರಗಳನ್ನು ಸರಿಯಾಗಿ ನಮೂದಿಸಿ", "warning");
          return;
        }

        try {
          await apiRequest("/padya", {
            method: "POST",
            body: JSON.stringify({
              parva_number,
              sandhi_number,
              padya_number,
              padya,
            }),
          });
          document.getElementById("padya_number").value = "";
          document.getElementById("padya_text").value = "";
          showAlert("ಹೊಸ ಪದ್ಯ ಸೇರಿಸಲ್ಪಟ್ಟಿದೆ ✅", "success");
          loadPadyaList();
        } catch (error) {
          showAlert(`ಪದ್ಯ ಸೇರಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ: ${error.message}`, "danger");
        }
      }

      async function editPadya(parva_number, sandhi_number, padya_number) {
        try {
          const result = await apiRequest(
            `/padya/${parva_number}/${sandhi_number}/${padya_number}`,
          );
          const data = result.data || result || {};

          document.getElementById("edit_parva_number").value = parva_number;
          document.getElementById("edit_sandhi_number").value = sandhi_number;
          document.getElementById("edit_padya_number").value =
            data.padya_number || padya_number;
          document.getElementById("edit_padya_text").value = data.padya || "";
          document.getElementById("edit_gadya").value = data.gadya || "";
          document.getElementById("edit_tippani").value = data.tippani || "";

          padyaModal.show();
        } catch (error) {
          showAlert(`ಪದ್ಯ ಲೋಡ್ ಆಗಲಿಲ್ಲ: ${error.message}`, "danger");
        }
      }

      async function updatePadya() {
        const parva_number = parseInt(
          document.getElementById("edit_parva_number").value,
        );
        const sandhi_number = parseInt(
          document.getElementById("edit_sandhi_number").value,
        );
        const padya_number = parseInt(
          document.getElementById("edit_padya_number").value,
        );
        const padya = document.getElementById("edit_padya_text").value.trim();
        const gadya = document.getElementById("edit_gadya").value;
        const tippani = document.getElementById("edit_tippani").value;

        if (!padya) {
          showAlert("ಪದ್ಯ ನಮೂದಿಸಿ", "warning");
          return;
        }

        try {
          await apiRequest(
            `/padya/${parva_number}/${sandhi_number}/${padya_number}`,
            {
              method: "PUT",
              body: JSON.stringify({
                padya_number,
                padya,
                gadya: gadya || null,
                tippani: tippani || null,
              }),
            },
          );
          padyaModal.hide();
          showAlert("ಪದ್ಯ ಸುಧಾರಿಸಲ್ಪಟ್ಟಿದೆ ✅", "success");
          loadPadyaList();
        } catch (error) {
          showAlert(`ಸುಧಾರಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ: ${error.message}`, "danger");
        }
      }

      function confirmDeletePadya() {
        const parva_number = document.getElementById("edit_parva_number").value;
        const sandhi_number =
          document.getElementById("edit_sandhi_number").value;
        const padya_number = document.getElementById("edit_padya_number").value;

        deleteAction = async () => {
          try {
            await apiRequest(
              `/padya/${parva_number}/${sandhi_number}/${padya_number}`,
              { method: "DELETE" },
            );
            padyaModal.hide();
            showAlert("ಪದ್ಯ ಅಳಿಸಲ್ಪಟ್ಟಿದೆ ✅", "success");
            loadPadyaList();
          } catch (error) {
            showAlert(`ಅಳಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ: ${error.message}`, "danger");
          }
        };
        deleteModal.show();
      }

      async function deletePadya(parva_number, sandhi_number, padya_number) {
        deleteAction = async () => {
          try {
            await apiRequest(
              `/padya/${parva_number}/${sandhi_number}/${padya_number}`,
              { method: "DELETE" },
            );
            showAlert("ಪದ್ಯ ಅಳಿಸಲ್ಪಟ್ಟಿದೆ ✅", "success");
            loadPadyaList();
          } catch (error) {
            showAlert(`ಅಳಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ: ${error.message}`, "danger");
          }
        };
        deleteModal.show();
      }

      // Event Listeners
      document
        .getElementById("confirmDeleteBtn")
        .addEventListener("click", async () => {
          if (deleteAction) {
            await deleteAction();
          }
          deleteModal.hide();
        });

      // Tab change handler
      document.querySelectorAll(".nav-link").forEach((link) => {
        link.addEventListener("shown.bs.tab", (e) => {
          currentTab = e.target.getAttribute("data-bs-target").replace("#", "");
        });
      });

      // INIT - Load on page load
      document.addEventListener("DOMContentLoaded", () => {
        loadParvas();
      });
    </script>
  </body>
</html>
