<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ಕಾವ್ಯ ಪ್ರವೇಶ</title>
    <!-- Bootstrap CSS via CDN -->
    <link rel="stylesheet" href="/static/boostrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/kavya.css">
    <!-- jQuery via CDN -->
    <script src="static/jquery/jquery-3.7.1.js"></script>
    <script src="static/jquery/jquery-3.7.1.min.js"></script>
    <!-- JavaScript -->
    <script src="/static/boostrap/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/kavya_process.js"></script>

</head>

<body>
    {% include 'navbar.html' %}
    <div class="container mt-4">
        <h5 class="mb-4 text-center">ಆಯ್ಕೆಮಾಡಿ</h5>
        <div class="dropdowns">
            <div class="dropdown">
                <label for="parvaDropdown" class="form-label">ಪರ್ವ</label>
                <select id="parvaDropdown" class="form-select">
                    <option selected>ಪರ್ವ ಆಯ್ಕೆಮಾಡಿ</option>
                </select>
            </div>
            <div class="dropdown">
                <label for="sandhiDropdown" class="form-label">ಸಂಧಿ</label>
                <select id="sandhiDropdown" class="form-select" disabled>
                    <option selected>ಸಂಧಿ ಆಯ್ಕೆಮಾಡಿ</option>
                </select>
            </div>
            <div class="dropdown">
                <label for="padyaNumberDropdown" class="form-label">ಪದ್ಯ ಸಂಖ್ಯೆ</label>
                <select id="padyaNumberDropdown" class="form-select" disabled>
                    <option selected>ಪದ್ಯ ಸಂಖ್ಯೆಯನ್ನು ಆಯ್ಕೆಮಾಡಿ</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="grid-container">
            <div class="grid-item">
                <span class="label">ಪದ್ಯ:</span>
                <div class="padya">1</div>
            </div>
            <div class="grid-item">
                <span class="label">ಪಾಠಾಂತರ:</span>
                <div class="pathantar">2</div>
            </div>
            <div class="grid-item">
                <span class="label">ಗದ್ಯ:</span>
                <div class="gadya">3</div>
            </div>
            <div class="grid-item">
                <span class="label">ಟಿಪ್ಪಣಿ:</span>
                <div class="tippani">4</div>
            </div>
            <div class="grid-item">
                <span class="label">ಅರ್ಥ:</span>
                <div class="artha">5</div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            $('#parvaDropdown').change(function () {
                $('#sandhiDropdown').prop('disabled', false);
            });

            $('#sandhiDropdown').change(function () {
                $('#padyaDropdown').prop('disabled', false);
            });

            $('#padyaDropdown').change(function () {
                $('#padyaNumberDropdown').prop('disabled', false);
            });
        });
    </script>
</body>

</html>
