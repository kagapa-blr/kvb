<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ಮುಖಪುಟ</title>
    <!-- Bootstrap CSS via CDN -->
    <link rel="stylesheet" href="/static/boostrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- jQuery via CDN -->
    <script src="static/jquery/jquery-3.7.1.js"></script>
    <script src="static/jquery/jquery-3.7.1.min.js"></script>
    <!-- JavaScript -->
    <script src="/static/boostrap/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/kavya_process.js"></script>
</head>
<body>
    {% include 'navbar.html' %}
    <div class="container mt-4">
        <h1 class="mb-4">Select Options</h1>
        <div class="row">
            <div class="col-md-3">
                <label for="parvaDropdown" class="form-label">Parva</label>
                <select id="parvaDropdown" class="form-select">
                    <option selected>Select Parva</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="sandhiDropdown" class="form-label">Sandhi</label>
                <select id="sandhiDropdown" class="form-select" disabled>
                    <option selected>Select Sandhi</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="padyaDropdown" class="form-label">Padya</label>
                <select id="padyaDropdown" class="form-select" disabled>
                    <option selected>Select Padya</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="padyaNumberDropdown" class="form-label">Padya Number</label>
                <select id="padyaNumberDropdown" class="form-select" disabled>
                    <option selected>Select Padya Number</option>
                </select>
            </div>
        </div>
        <div id="padyaContent" class="mt-4">
            result:
        </div>
    </div>
     <div class="container">
        <!-- First div (full width) -->
        <div class="row">
            <div class="col padya">1</div>
        </div>

        <!-- Second and third divs (same row) -->
        <div class="row">
            <div class="col pathantar">2</div>
            <div class="col gadya">3</div>
        </div>

        <!-- Fourth and fifth divs (same row) -->
        <div class="row">
            <div class="col tippani">4</div>
            <div class="col artha">5</div>
        </div>

    </div>

    <script>
        $(document).ready(function() {
            $('#parvaDropdown').change(function() {
                // Enable the next dropdown
                $('#sandhiDropdown').prop('disabled', false);
            });

            $('#sandhiDropdown').change(function() {
                // Enable the next dropdown
                $('#padyaDropdown').prop('disabled', false);
            });

            $('#padyaDropdown').change(function() {
                // Enable the next dropdown
                $('#padyaNumberDropdown').prop('disabled', false);
            });
        });
    </script>
</body>
</html>
