<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ಲಾಗಿನ್ - Kvb Admin</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap-icons.css') }}" />
    <!-- Bootstrap JS -->
    <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
    <!-- Axios for HTTP requests -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    
    <style>
        :root {
            --primary-color: #4a5568;
            --secondary-color: #2d3748;
            --accent-color: #48bb78;
            --error-color: #f56565;
            --light-bg: #f7fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--secondary-color) 0%, var(--primary-color) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .login-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
            margin: 0;
        }

        .login-body {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--secondary-color);
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1.5px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(72, 187, 120, 0.1);
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle input {
            padding-right: 45px;
        }

        .toggle-password-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.6;
            transition: opacity 0.2s ease;
        }

        .toggle-password-btn:hover {
            opacity: 1;
        }

        .alert-error {
            background-color: #fff5f5;
            border-left: 4px solid var(--error-color);
            color: #c53030;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert-error.show {
            display: block;
        }

        .alert-error i {
            margin-right: 8px;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-color) 0%, #38a169 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
        }

        .submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .spinner-border {
            width: 16px;
            height: 16px;
            border-width: 2px;
        }

        .login-footer {
            padding: 20px 40px;
            background: var(--light-bg);
            text-align: center;
            font-size: 13px;
            color: #718096;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                max-width: 100%;
            }

            .login-body {
                padding: 30px 20px;
            }

            .login-header {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }

        /* Success state */
        .form-group.success input {
            border-color: var(--accent-color);
            background-color: #f0fdf4;
        }

        /* Error state */
        .form-group.error input {
            border-color: var(--error-color);
            background-color: #fff5f5;
        }
    </style>
</head>

<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <!-- Header -->
        <div class="login-header">
            <h1>KVB Admin</h1>
            <p>ಕನ್ನಡ ವಾಕ್ಯಾರ್ಥ ಭಾವಪ್ರಶ್ನೋತ್ತರ</p>
        </div>

        <!-- Login Form -->
        <div class="login-body">
            <!-- Error Alert -->
            {% if error %}
            <div class="alert-error show" id="errorAlert" role="alert">
                <i class="bi bi-exclamation-circle"></i>
                <span id="errorMessage">{{ error }}</span>
            </div>
            {% endif %}

            <form id="loginForm" method="POST" action="/login" novalidate>
                <!-- Username Field -->
                <div class="form-group">
                    <label for="username">
                        <i class="bi bi-person"></i> ಬಳಕೆದಾರ ಹೆಸರು
                    </label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        class="form-control"
                        placeholder="ನಿಮ್ಮ ಬಳಕೆದಾರ ಹೆಸರನ್ನು ನಮೂದಿಸಿ"
                        required
                        autocomplete="username"
                    />
                </div>

                <!-- Password Field -->
                <div class="form-group password-toggle">
                    <label for="password">
                        <i class="bi bi-lock"></i> ಗುಪ್ತಪದ
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-control"
                        placeholder="ನಿಮ್ಮ ಗುಪ್ತಪದವನ್ನು ನಮೂದಿಸಿ"
                        required
                        autocomplete="current-password"
                    />
                    <button
                        type="button"
                        class="toggle-password-btn"
                        id="togglePasswordBtn"
                        title="Kannada: ಗುಪ್ತಪದ ತೋರಿಸಿ/ಮರೆ ಮಾಡಿ"
                    >
                        <i class="bi bi-eye"></i>
                    </button>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn">
                    <i class="bi bi-box-arrow-in-right"></i>
                    <span>ಪ್ರವೇಶಿಸಿ</span>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <p>© 2024 KVB Admin Portal. ಎಲ್ಲಾ ಹಕ್ಕುಗಳು ಸಂರಕ್ಷಿತ.</p>
        </div>
    </div>

    <script>
        /**
         * Initialize login form with enhanced UX
         */
        function initializeLoginForm() {
            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const togglePasswordBtn = document.getElementById('togglePasswordBtn');
            const submitBtn = document.getElementById('submitBtn');
            const errorAlert = document.getElementById('errorAlert');

            // Password visibility toggle
            if (togglePasswordBtn) {
                togglePasswordBtn.addEventListener('click', () => {
                    const isPassword = passwordInput.type === 'password';
                    passwordInput.type = isPassword ? 'text' : 'password';
                    togglePasswordBtn.innerHTML = isPassword
                        ? '<i class="bi bi-eye-slash"></i>'
                        : '<i class="bi bi-eye"></i>';
                });
            }

            // Form submission
            form.addEventListener('submit', (e) => {
                e.preventDefault();

                const username = usernameInput.value.trim();
                const password = passwordInput.value;

                // Client-side validation
                if (!username || !password) {
                    showError('ಬಳಕೆದಾರ ಹೆಸರು ಮತ್ತು ಗುಪ್ತಪದ ಎರಡೂ ಅಗತ್ಯ');
                    return;
                }

                // Show loading state
                showLoading();
                submitBtn.disabled = true;

                // Submit form
                setTimeout(() => {
                    form.submit();
                }, 500);
            });

            // Clear error on input
            usernameInput.addEventListener('input', clearError);
            passwordInput.addEventListener('input', clearError);

            // Focus on username input
            usernameInput.focus();
        }

        /**
         * Show error message
         */
        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            if (errorAlert) {
                errorMessage.textContent = message;
                errorAlert.classList.add('show');
            }
        }

        /**
         * Clear error message
         */
        function clearError() {
            const errorAlert = document.getElementById('errorAlert');
            if (errorAlert) {
                errorAlert.classList.remove('show');
            }
        }

        /**
         * Show loading overlay
         */
        function showLoading() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            if (loadingOverlay) {
                loadingOverlay.classList.add('show');
            }
        }

        /**
         * Hide loading overlay
         */
        function hideLoading() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            if (loadingOverlay) {
                loadingOverlay.classList.remove('show');
            }
        }

        // Initialize on DOM ready
        document.addEventListener('DOMContentLoaded', initializeLoginForm);

        // Hide loading overlay on page load
        window.addEventListener('load', hideLoading);
    </script>
</body>

</html>
