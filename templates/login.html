<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='boostrap/css/bootstrap.min.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <!-- Bootstrap JS -->
  <script src="{{ url_for('static', filename='boostrap/js/bootstrap.bundle.min.js') }}"></script>
  <!-- Axios for HTTP requests (Required by restclient.js) -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body>
  <!-- Navbar included -->
  {% include 'navbar.html' %}

  <div class="container" style="
        max-width: 500px;
        margin-top: 50px;
        margin-bottom: 150px;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        
      ">
    <h1 style="text-align: center">Login</h1>
    <form id="loginForm" action="/login" method="POST" style="margin-top: 20px">
      <div class="mb-3">
        <label for="username" class="form-label">Username:</label>
        <input type="text" id="username" name="username" class="form-control" style="border-radius: 5px" required />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password:</label>
        <input type="password" id="password" name="password" class="form-control" style="border-radius: 5px" required />
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    {% if error %}
    <p style="color: red; text-align: center; margin-top: 10px">
      {{ error }}
    </p>
    {% endif %}
  </div>

  <script>
    // Load restclient.js for base URL support
    const script = document.createElement('script');
    script.src = '{{ url_for("static", filename="js/restclient.js") }}';
    script.onload = function () {
      initializeLoginForm();
    };
    document.head.appendChild(script);

    /**
     * Initialize login form with base URL support
     * Waits for ApiClient to be ready, then updates form action
     */
    function initializeLoginForm() {
      const checkInterval = setInterval(() => {
        // Check if ApiClient is available with required methods
        if (typeof window.ApiClient !== 'undefined' &&
          typeof window.ApiClient.resolvePath === 'function') {
          clearInterval(checkInterval);
          applyBaseUrlToLoginForm();
          console.log('[Login] Form initialized with base URL support');
        }
      }, 50); // Check every 50ms

      // Timeout after 5 seconds
      setTimeout(() => {
        if (checkInterval) clearInterval(checkInterval);
      }, 5000);
    }

    /**
     * Apply base URL to login form action
     * Updates action attribute to include base URL path for subdirectory deployments
     */
    function applyBaseUrlToLoginForm() {
      try {
        const form = document.getElementById('loginForm');
        if (form) {
          // Resolve the /login path with the current base URL
          const resolvedPath = window.ApiClient.resolvePath('/login');
          form.action = resolvedPath;

          const baseUrl = window.ApiClient.getBaseUrl();
          if (baseUrl) {
            console.log('[Login] Applied base URL to form:', baseUrl);
            console.log('[Login] Form action updated to:', form.action);
          }
        }
      } catch (error) {
        console.error('[Login] Error applying base URL to form:', error);
      }
    }

    /**
     * Original loading overlay functionality
     */
    // Function to show loading overlay
    function showLoading() {
      const loadingElement = document.getElementById("loadingOverlay");
      if (loadingElement) {
        loadingElement.style.display = "flex";
      }
    }

    // Function to hide loading overlay
    function hideLoading() {
      const loadingElement = document.getElementById("loadingOverlay");
      if (loadingElement) {
        loadingElement.style.display = "none";
      }
    }

    document
      .getElementById("loginForm")
      .addEventListener("submit", function (event) {
        // Show loading overlay
        showLoading();
      });
  </script>
  <!-- Footer included -->
  {% include 'footer.html' %}
</body>

</html>
