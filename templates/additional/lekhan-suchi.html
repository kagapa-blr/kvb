<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ಲೇಖನ ಸೂಚಿ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8dfbe;
            font-family: "Arial", sans-serif;
        }
        .header {
            text-align: center;
            font-size: 30px;
            font-weight: bold;
            padding: 10px;
            background-color: #f4b183;
            border-radius: 10px;
            margin-top: 20px;
            color: #000;
            text-shadow: 1px 1px 2px #8c5705;
        }
        .main-section {
            background-color: #f4c4a5;
            border: 1px solid #e6b89c;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
        }
        .radio-section {
            background-color: #f9b389;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .form-check-inline {
            margin-right: 10px;
        }
        .list-section {
            background-color: #fff;
            border: 1px solid #ccc;
            height: 250px;
            overflow-y: scroll;
            margin-bottom: 20px;
        }
        .input-section .input-group {
            margin-bottom: 15px;
        }
        .input-group-text {
            background-color: #ffd966;
            width: 120px;
            font-weight: bold;
        }
        .footer-note {
            font-size: 14px;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <!-- Include Navbar -->
    {% include 'navbar.html' %}
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            ಲೇಖನ ಸೂಚಿ
        </div>

        <!-- Main Section -->
        <div class="main-section">
            <!-- Radio Buttons Section -->
            <div class="radio-section d-flex justify-content-start align-items-center">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="options" id="option1" checked>
                    <label class="form-check-label" for="option1">ಲೇಖನ ಸೂಚಿ</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="options" id="option2">
                    <label class="form-check-label" for="option2">ಪರಾಮರ್ಶ ಕೃತಿಗಳು</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="options" id="option3">
                    <label class="form-check-label" for="option3">ಪರಿಷ್ಕರಣ ಆವೃತ್ತಿಗಳು</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="options" id="option4">
                    <label class="form-check-label" for="option4">ಗದ್ಯಾನುವಾದಗಳು</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="options" id="option5">
                    <label class="form-check-label" for="option5">ಸಂಪ್ರಬಂಧಗಳು</label>
                </div>
            </div>

            <!-- Content Section -->
            <div class="row">
                <!-- List Section -->
                <div class="col-md-6">
                    <div class="list-section">
                        <table class="table table-bordered">
                            <thead>
                                <tr>
                                    <th>ಐಡಿ</th>
                                    <th>ಲೇಖಕರು</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr data-author="ಆನಂದ" data-title="Title1" data-publication="Publication details 1">
                                    <td>1</td><td>ಆನಂದ</td>
                                </tr>
                                <tr data-author="ಆನಂದಮೂರ್ತಿ" data-title="Title2" data-publication="Publication details 2">
                                    <td>2</td><td>ಆನಂದಮೂರ್ತಿ</td>
                                </tr>
                                <tr data-author="ಆನಂತ" data-title="Title3" data-publication="Publication details 3">
                                    <td>3</td><td>ಆನಂತ</td>
                                </tr>
                                <tr data-author="ಅಂಜಲಿ" data-title="Title4" data-publication="Publication details 4">
                                    <td>4</td><td>ಅಂಜಲಿ</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Input Section -->
                <div class="col-md-6 input-section">
                    <div class="input-group">
                        <span class="input-group-text">ಲೇಖಕರು</span>
                        <input type="text" id="author" class="form-control" readonly>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text">ಲೇಖನ</span>
                        <input type="text" id="title" class="form-control" readonly>
                    </div>
                    <div class="input-group">
                        <span class="input-group-text">ಪ್ರಕಟಣೆ</span>
                        <textarea id="publication" class="form-control" readonly></textarea>
                    </div>
                </div>
            </div>

            <!-- Footer Note -->
            <div class="footer-note">
                ಸೂಚನೆ: ವಿವರವನ್ನು ಪಡೆಯಲು ಲೇಖಕರ ಹೆಸರಿನ ಮೇಲೆ ಕ್ಲಿಕ್ ಮಾಡಿ.
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // JavaScript to handle row clicks
        document.querySelectorAll('.list-section table tbody tr').forEach(row => {
            row.addEventListener('click', function() {
                // Get data from the row's data attributes
                const author = this.getAttribute('data-author');
                const title = this.getAttribute('data-title');
                const publication = this.getAttribute('data-publication');
                
                // Set the input fields with the row's data
                document.getElementById('author').value = author;
                document.getElementById('title').value = title;
                document.getElementById('publication').value = publication;
            });
        });
    </script>
    
    <!-- Include Footer -->
    {% include 'footer.html' %}
</body>
</html>
