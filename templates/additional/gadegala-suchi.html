<!DOCTYPE html>
<html lang="kn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ಗಾದೆಗಳ ಸೂಚಿ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/font-awesome-6.6.0-all.min.css') }}" />
  <script src="{{ url_for('static', filename='jquery/jquery-3.7.1.js') }}"></script>
  <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
  <link href="{{ url_for('static', filename='DataTables/datatables.min.css') }}" rel="stylesheet" />
  <script src="{{ url_for('static', filename='DataTables/datatables.min.js') }}"></script>
  <!-- Axios for HTTP requests (CDN) - MUST load before restclient.js -->
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="{{ url_for('static', filename='js/restclient.js') }}"></script>

  <style>
    body {
      /* background-color: #FFDAB9; */
      font-family: Arial, sans-serif;
    }

    .container {
      background-color: #ffe4b5;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .title {
      background-color: #ffdab9;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      position: relative;
    }

    .back-button {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    .alphabet-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .alphabet-grid span {
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 5px;
      background-color: #fff;
      border: 1px solid #ddd;
    }

    .alphabet-grid span:hover {
      background-color: #f0f0f0;
    }

    .parva-dropdown {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .word-table {
      border: 1px solid #dee2e6;
    }

    .footer {
      font-size: 15px;
      margin-top: 20px;
    }

    .form-select {
      background-color: #fff;
      max-width: 300px;
    }

    #dictionaryTable thead th {
      cursor: pointer;
    }

    #dictionaryTable thead th:hover {
      background-color: #f8f9fa;
    }

    /* Modal styling */
    .modal-dialog {
      max-width: 90%;
      margin: 1.75rem auto;
    }

    .modal-content {
      border-radius: 8px;
    }

    .modal-header,
    .modal-body,
    .modal-footer {
      padding: 20px;
    }

    .modal-header {
      background-color: #343a40;
      color: #fff;
      border-bottom: 1px solid #dee2e6;
    }

    .modal-title {
      font-size: 1.5rem;
    }

    .modal-body {
      background-color: #f8f9fa;
      color: #495057;
    }

    .modal-footer {
      border-top: 1px solid #dee2e6;
      background-color: #f8f9fa;
    }

    .modal-footer .btn-secondary {
      background-color: #6c757d;
      border-color: #6c757d;
    }

    .modal-footer .btn-secondary:hover {
      background-color: #5a6268;
      border-color: #545b62;
    }

    .spinner-border {
      width: 3rem;
      height: 3rem;
    }
  </style>
</head>

<body>
  {% include 'navbar.html' %}
  <div class="container">
    <div class="title">
      <h1 class="text-center mb-0">ಗಾದೆಗಳ ಸೂಚಿ</h1>
      <button class="btn btn-sm btn-secondary back-button">
        ಹಿಂದಿನ ಪುಟಕ್ಕೆ
      </button>
    </div>

    <div class="alphabet-grid">
      <span>ಅ</span><span>ಆ</span><span>ಇ</span><span>ಈ</span><span>ಉ</span><span>ಊ</span><span>ಋ</span><span>ಎ</span><span>ಏ</span><span>ಐ</span><span>ಒ</span>
      <span>ಓ</span><span>ಔ</span><span>ಕ</span><span>ಖ</span><span>ಗ</span><span>ಘ</span><span>ಙ</span><span>ಚ</span><span>ಛ</span><span>ಜ</span><span>ಝ</span>
      <span>ಞ</span><span>ಟ</span><span>ಠ</span><span>ಡ</span><span>ಢ</span><span>ಣ</span><span>ತ</span><span>ಥ</span><span>ದ</span><span>ಧ</span>
      <span>ನ</span><span>ಪ</span><span>ಫ</span><span>ಬ</span><span>ಭ</span><span>ಮ</span><span>ಯ</span><span>ರ</span><span>ಲ</span><span>ವ</span>
      <span>ಶ</span><span>ಷ</span>
    </div>

    <div class="parva-dropdown">
      <select id="parvaDropdown" class="form-select">
        <!-- <option value="">ಎಲ್ಲಾ ಪರ್ವಗಳು</option> -->
      </select>
    </div>

    <div class="word-table">
      <table id="dictionaryTable" class="table table-striped hover">
        <thead>
          <tr>
            <th>ಗಾದೆ</th>
            <th>ಪರ್ವ</th>
            <th>ಸಂಧಿಯ ಹೆಸರು</th>
            <th>ಪದ್ಯದ ಸಂಖ್ಯೆ</th>
          </tr>
        </thead>
        <tbody>
          <!-- Data will be populated here -->
        </tbody>
      </table>
    </div>

    <div class="footer text-center">
      <strong>ಸೂಚನೆ: </strong>ಪದ್ಯದ ಪೂರ್ಣ ವಿವರನ್ನು ಪಡೆಯಲು ಪದ್ಯದ ಮೇಲೆ ಕ್ಲಿಕ್
      ಮಾಡಿ
    </div>
  </div>

  <!-- Modal for displaying padya details -->
  <div class="modal fade" id="padyaModal" tabindex="-1" aria-labelledby="padyaModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="padyaModalLabel">ಪದ್ಯದ ವಿವರಣೆ</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Close
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    $(document).ready(function () {
      // Initialize DataTable
      const table = $("#dictionaryTable").DataTable({
        language: {
          search: "ಹುಡುಕು:",
          lengthMenu: "_MENU_ ಪದಗಳನ್ನು ತೋರಿಸು",
          info: "_TOTAL_ ಪದಗಳಲ್ಲಿ _START_ ರಿಂದ _END_ ವರೆಗಿನ ಪದಗಳು",
          paginate: {
            first: "ಮೊದಲ",
            last: "ಕೊನೆಯ",
            next: "ಮುಂದಿನ",
            previous: "ಹಿಂದಿನ",
          },
          sortAscending: ": ಆರೋಹಣ ಕ್ರಮದಲ್ಲಿ ವಿಂಗಡಿಸಲು ಸಕ್ರಿಯಗೊಳಿಸಿ",
          sortDescending: ": ಅವರೋಹಣ ಕ್ರಮದಲ್ಲಿ ವಿಂಗಡಿಸಲು ಸಕ್ರಿಯಗೊಳಿಸಿ",
        },
        pageLength: 5,
        lengthMenu: [5, 10, 25, 50, 100, 500, 1000],
        ordering: true,
        order: [[0, "asc"]],
        columns: [
          { data: "gade_suchi", title: "ಗಾದೆ" },
          { data: "parva_name", title: "ಪರ್ವ" },
          { data: "sandhi_number", title: "ಸಂಧಿಯ ಹೆಸರು" },
          { data: "padya_number", title: "ಪದ್ಯದ ಸಂಖ್ಯೆ" },
        ],
      });

      allParva = new Set();
      // Fetch data from Flask API and populate the table
      window.ApiClient.get("/gade-suchi/data")
        .then((data) => {
          if (Array.isArray(data)) {
            table.clear().rows.add(data).draw();

            // Extract unique parva names and populate dropdown
            data.forEach((item) => allParva.add(item.parva_name));
            const parvaArray = Array.from(allParva);

            const sortedParva = parvaArray.sort((a, b) =>
              a.localeCompare(b, "kn")
            ); // 'kn' for Kannada locale
            // Populate dropdown
            const dropdown = $("#parvaDropdown");
            dropdown.append('<option value="">ಎಲ್ಲಾ ಪರ್ವಗಳು</option>');
            sortedParva.forEach((parva) => {
              dropdown.append(`<option value="${parva}">${parva}</option>`);
            });
          } else {
            console.error("Unexpected data format:", data);
          }
        })
        .catch((error) => {
          console.error("Error fetching data:", error);
          // Handle error here, maybe show a message to the user
        });

      // Filter by dropdown
      $("#parvaDropdown").on("change", function () {
        const selectedType = $(this).val();
        if (selectedType === "ಎಲ್ಲಾ ಪರ್ವಗಳು") {
          table.column(1).search("").draw();
        } else {
          table.column(1).search(selectedType).draw();
        }
      });

      // Event handler for alphabet click
      $(".alphabet-grid span").on("click", function () {
        const letter = $(this).text();  // Get the clicked Kannada letter

        // Clear any previous search
        table.search('').draw();

        // Update the custom filter and redraw the table
        updateFilter(letter);
      });

      // Function to update the custom filter
      function updateFilter(letter) {
        $.fn.dataTable.ext.search.push(function (settings, data, dataIndex) {
          const padyafirstline = data[0]; // Adjust this if the property name is different

          if (!letter) {
            return true; // If no letter is selected, show all rows
          }

          // Check if padyafirstline exists and starts with the letter
          if (padyafirstline && padyafirstline.length > 0) {
            const firstChar = padyafirstline.charAt(0);
            console.log(firstChar)
            if (letter == firstChar) {
              console.log('match found', padyafirstline)
            }
            return firstChar === letter;
          }
          return false;
        });

        // Redraw the table with the new filter
        table.search(letter).draw();

        // Remove the custom filter function after use to avoid unintended filtering in future searches
        $.fn.dataTable.ext.search.pop();
      }


      // Handle row click event to show modal
      $("#dictionaryTable tbody").on("click", "tr", function () {
        const rowData = table.row(this).data();
        console.log("Row data:", rowData);

        if (rowData) {
          const parva = rowData.parva_number;
          const sandhi = rowData.sandhi_number;
          const padya = rowData.padya_number;
          const gade = rowData.gade_suchi;
          const parva_name = rowData.parva_name;

          // Construct the URL for the API call
          const apiUrl = `/api/padya/by_parva_sandhi_padya/${parva}/${sandhi}/${padya}`;
          console.log("API URL:", apiUrl); // Debug log

          // Show loading spinner
          $("#padyaModal .modal-body").html(
            '<div class="text-center p-5"><div class="spinner-border" role="status"><span class="sr-only">Loading...</span></div></div>'
          );
          $("#padyaModal").modal("show"); // Show modal immediately

          // Fetch details from the API
          window.ApiClient.get(apiUrl)
            .then((data) => {
              console.log("API Response:", data); // Debug log

              if (data && !data.error) {
                // Generate highlighted padya content
                let highlightContent = data.padya || "N/A";
                try {
                  highlightContent = highlightWords(data.padya, gade);
                } catch (err) {
                  console.error("Error highlighting words:", err);
                }

                // ✅ Fixed: Build complete modal content directly (no jQuery ID selectors needed)
                const modalContent = `
            <div class="padya-details">
              <h5 class="mb-3"><strong>ಪರ್ವದ ಹೆಸರು:</strong> ${escapeHtml(parva_name)}</h5>
              <p class="mb-2"><strong>ಸಂಧಿ ಸಂಖ್ಯೆ:</strong> ${sandhi}</p>
              <p class="mb-3"><strong>ಪದ್ಯ ಸಂಖ್ಯೆ:</strong> ${padya}</p>
              <div class="mb-3">
                <strong>ಪದ್ಯ:</strong>
                <pre class="p-2 rounded bg-light border">${highlightContent}</pre>
              </div>
              <p class="mb-2"><strong>ಅರ್ಥ:</strong> ${escapeHtml(data.artha || "N/A")}</p>
              <p class="mb-2"><strong>ಟಿಪ್ಪಣಿ:</strong> ${escapeHtml((data.tippani || "").replace("nan", "-") || "N/A")}</p>
              <p class="mb-2"><strong>ಪಾಠಾಂತರ:</strong> ${escapeHtml(data.pathantar || "N/A")}</p>
              ${data.gadya ? `<p class="mb-2"><strong>ಗದ್ಯ:</strong> ${escapeHtml(data.gadya)}</p>` : ''}
              ${data.suchane ? `<p><strong>ಸೂಚನೆ:</strong> ${escapeHtml(data.suchane)}</p>` : ''}
            </div>
          `;

                $("#padyaModal .modal-body").html(modalContent);

              } else {
                $("#padyaModal .modal-body").html(
                  `<div class="alert alert-warning">
              <strong>ಎಚ್ಚರಿಕೆ:</strong> ${data?.error || 'ಪದ್ಯ ವಿವರಗಳು ಲಭ್ಯವಿಲ್ಲ'}
            </div>`
                );
              }
            })
            .catch((error) => {
              console.error("Error fetching padya details:", error);
              $("#padyaModal .modal-body").html(
                `<div class="alert alert-danger">
            <strong>ದೋಷ:</strong> ಸರ್ವರ್ ದೋಷ. ದಯವಿಟ್ಟು ನಂತರ ಪುನಃ ಪ್ರಯತ್ನಿಸಿ.<br>
            <small>URL: ${apiUrl}</small>
          </div>`
              );
            });
        }
      });

      function escapeHtml(text) {
        if (!text || typeof text !== 'string') {
          return '';
        }
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      // Function to escape special characters for regex
      function escapeRegExp(text) {
        return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); // Escape special characters
      }

      // Function to highlight all words in the specified line with a yellow background
      function highlightWords(text, line) {
        if (!text || typeof text !== 'string') {
          return text || '';
        }
        if (!line) return text; // Return text if no line provided

        console.log("Line:", line);

        // Extract all words from the line
        const words = line.split(/\s+/).filter(Boolean); // Split by whitespace and filter out empty strings

        if (words.length === 0) return text; // Return text if no valid words

        // Escape and create a regex pattern to match any of the words
        const escapedWords = words.map(escapeRegExp).join("|");
        const regex = new RegExp(`(${escapedWords})`, "gi"); // Case-insensitive search

        try {
          // Highlight all occurrences of the words in the text
          return escapeHtml(text).replace(
            regex,
            '<span style="background-color: yellow;">$1</span>'
          );
        } catch (e) {
          console.error("Error creating regex pattern:", e);
          return text; // Return original text if regex fails
        }
      }

      // Back button functionality
      $(".back-button").on("click", function () {
        alert("Navigating to previous page");
      });
    });
  </script>

  {% include 'footer.html' %}
</body>

</html>
