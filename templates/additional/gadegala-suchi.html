<!DOCTYPE html>
<html lang="kn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ಗಾದೆಗಳ ಸೂಚಿ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap-icons.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/noto-sans-kannada.css') }}" />
  <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/cdn/axios.min.js') }}"></script>
  <link href="{{ url_for('static', filename='DataTables/datatables.min.css') }}" rel="stylesheet">

  <style>
    :root {
      --bg-primary: #ffdab9;
      --bg-secondary: #ffe4b5;
      --shadow-light: rgba(0, 0, 0, .08)
    }

    body {
      background: var(--bg-primary);
      font-family: 'NudiParijatha', Arial, sans-serif
    }

    .container {
      max-width: 1200px;
      margin: 24px auto;
      padding: 24px;
      background: var(--bg-secondary);
      border-radius: 12px;
      box-shadow: 0 8px 32px var(--shadow-light)
    }

    .title {
      position: relative;
      padding: 24px;
      border-radius: 8px;
      background: var(--bg-primary);
      margin-bottom: 32px;
      text-align: center
    }

    .back-button {
      position: absolute;
      top: 12px;
      right: 12px
    }

    .alphabet-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 32px 0;
      padding: 20px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 12px var(--shadow-light)
    }

    .alphabet-grid span {
      font-size: 1.25rem;
      font-weight: 600;
      cursor: pointer;
      padding: 10px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      transition: all .2s
    }

    .alphabet-grid span:hover,
    .alphabet-grid span.active {
      background: #e3f2fd;
      border-color: #2196f3;
      color: #2196f3
    }

.dropdown-center{
  text-align:center;
  margin:24px 0;
}

.dropdown-center .form-select{
  display:inline-block;
  width:420px;
  max-width:90%;
  border-radius:8px;
  border:2px solid #e0e0e0;
  font-size:1rem;
  padding:10px 16px;
}

    .table-container {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 20px var(--shadow-light);
      margin: 24px 0
    }

    .table-clean {
      font-size: .95rem
    }

    .table-clean thead th {
      font-weight: 600;
      color: #495057;
      background: linear-gradient(180deg, #f8f9fa 0%, #f1f3f4 100%);
      border: none;
      padding: 16px 12px;
      border-bottom: 3px solid #dee2e6;
      cursor: pointer
    }

    .table-clean tbody td {
      padding: 14px 12px;
      border-color: #f1f3f4;
      vertical-align: middle;
      font-weight: 500
    }

    .table-clean tbody tr:hover {
      background: #f8f9ff
    }

    .footer {
      font-size: .9rem;
      color: #6c757d;
      margin: 24px 0;
      text-align: center;
      font-weight: 500
    }

    /* SIMPLIFIED MODAL - No JS needed */
    .modal-dialog {
      max-width: 95vw;
      margin: 2rem auto
    }

    .modal-content {
      border-radius: 12px;
      border: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .15)
    }

    .modal-header {
      background: #667eea;
      color: #fff;
      border-radius: 12px 12px 0 0;
      padding: 20px
    }

    .modal-body {
      padding: 24px;
      background: #fff;
      max-height: 75vh;
      overflow-y: auto
    }

    /* SIMPLE FIRST LINE HIGHLIGHT - CSS only */
    .first-line {
      background: linear-gradient(90deg, #fff3cd 0%, #ffeaa7 100%);
      padding: 16px !important;
      border-left: 5px solid #f39c12;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1.05em;
      margin: 12px 0;
      box-shadow: 0 2px 8px rgba(243, 156, 18, .2)
    }
  </style>

  <script src="{{ url_for('static', filename='jquery/jquery-3.7.1.min.js') }}"></script>
  <script src="{{ url_for('static', filename='DataTables/datatables.min.js') }}"></script>
  <script type="module" src="{{ url_for('static', filename='js/additional/gadesuchi.js') }}"></script>
</head>

<body>
  {% include 'navbar.html' %}

  <div class="container">
    <div class="title">
      <h1 class="mb-0 fs-1 fw-bold">ಅಕಾರಾದಿ ಸೂಚಿ</h1>
      <button class="btn btn-outline-secondary back-button">ಹಿಂದಿನ ಪುಟಕ್ಕೆ</button>
    </div>

    <div class="alphabet-grid">
      <span>ಅ</span><span>ಆ</span><span>ಇ</span><span>ಈ</span><span>ಉ</span><span>ಊ</span><span>ಋ</span><span>ಎ</span><span>ಏ</span><span>ಐ</span><span>ಒ</span>
      <span>ಓ</span><span>ಔ</span><span>ಕ</span><span>ಖ</span><span>ಗ</span><span>ಘ</span><span>ಙ</span><span>ಚ</span><span>ಛ</span><span>ಜ</span><span>ಝ</span>
      <span>ಞ</span><span>ಟ</span><span>ಠ</span><span>ಡ</span><span>ಢ</span><span>ಣ</span><span>ತ</span><span>ಥ</span><span>ದ</span><span>ಧ</span>
      <span>ನ</span><span>ಪ</span><span>ಫ</span><span>ಬ</span><span>ಭ</span><span>ಮ</span><span>ಯ</span><span>ರ</span><span>ಲ</span><span>ವ</span>
      <span>ಶ</span><span>ಷ</span>
    </div>

    <div class="dropdown-center">
      <select id="parvaDropdown" class="form-select">
        <option value="">ಎಲ್ಲಾ ಪರ್ವಗಳು</option>
      </select>
    </div>

    <div class="table-container">
      <table id="dictionaryTable" class="table table-clean mb-0">
        <thead>
          <tr>
            <th>ಪದ್ಯದ ಮೊದಲ ಸಾಲು</th>
            <th>ಪರ್ವ ಸಂಖ್ಯೆ</th>
            <th>ಸಂಧಿ ಸಂಖ್ಯೆ</th>
            <th>ಪದ್ಯದ ಸಂಖ್ಯೆ</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="footer">
      <strong>ಸೂಚನೆ:</strong> ಪದ್ಯದ ವಿವರಣೆ ಓದಲು ಪದ್ಯವನ್ನು ಕ್ಲಿಕ್ ಮಾಡಿ.
    </div>
  </div>

  <!-- CLEAN SIMPLE MODAL -->
  <div class="modal fade" id="padyaModal" tabindex="-1" aria-labelledby="padyaModalLabel">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold mb-0" id="padyaModalLabel">ಪದ್ಯದ ವಿವರಣೆ</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- FIRST LINE WILL APPEAR HERE - Just add class="first-line" in your JS -->
          <div id="modalContent"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">ಮುಚ್ಚಿ</button>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
