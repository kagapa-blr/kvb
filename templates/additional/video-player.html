<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel=\"stylesheet\" href=\"{{ url_for('static', filename='css/style.css' ) }}\">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .player-container {
            max-width: 1200px;
            margin: 2rem auto;
            background-color: #ffffff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .navigation-controls {
            background-color: #f1f3f5;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-container {
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #e9ecef;
        }

        #video {
            max-width: 100%;
            max-height: 100%;
            border: 1px solid #dee2e6;
        }

        .controls {
            background-color: #f1f3f5;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-control {
            font-size: 1.2rem;
            padding: 0.5rem 1rem;
            margin: 0.2rem;
        }

        .video-info {
            font-size: 1.2rem;
            font-weight: bold;
            color: #495057;
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}
    <div class="container-fluid">
        <div class="player-container">
            <div class="navigation-controls">
                <button id="prevBtn" class="btn btn-primary btn-control">
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <span class="video-info">
                    Video: <span id="currentVideo">1</span> of <span id="totalVideos">5</span>
                    <br>Current Video: <span id="currentVideoName">Video 1</span>
                </span>
                <button id="nextBtn" class="btn btn-primary btn-control">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <div class="video-container">
                <video id="video" controls>
                    <source id="videoSource" src="{{ url_for('get_video', filename=videos[0]) }}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="controls">
                <div class="mt-3">
                    <button id="volumeDownBtn" class="btn btn-secondary btn-control">
                        <i class="fas fa-volume-down"></i> Volume Down
                    </button>
                    <button id="volumeUpBtn" class="btn btn-secondary btn-control">
                        <i class="fas fa-volume-up"></i> Volume Up
                    </button>
                    <button id="speedDownBtn" class="btn btn-secondary btn-control">
                        <i class="fas fa-tachometer-alt"></i> Speed Down
                    </button>
                    <button id="speedUpBtn" class="btn btn-secondary btn-control">
                        <i class="fas fa-tachometer-alt"></i> Speed Up
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const videoElement = document.getElementById('video');
        const videoSource = document.getElementById('videoSource');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const volumeDownBtn = document.getElementById('volumeDownBtn');
        const volumeUpBtn = document.getElementById('volumeUpBtn');
        const speedDownBtn = document.getElementById('speedDownBtn');
        const speedUpBtn = document.getElementById('speedUpBtn');
        const currentVideoSpan = document.getElementById('currentVideo');
        const totalVideosSpan = document.getElementById('totalVideos');
        const currentVideoNameSpan = document.getElementById('currentVideoName');

        const videos = {{ videos| tojson | safe }};
        let currentVideoIndex = 0;
        let volume = 1; // Volume ranges from 0.0 to 1.0
        let playbackSpeed = 1; // Playback speed

        totalVideosSpan.textContent = videos.length;

        function updateVideo() {
            videoSource.src = `{{ url_for('get_video', filename='') }}${videos[currentVideoIndex]}`;
            videoElement.load();
            currentVideoSpan.textContent = currentVideoIndex + 1;
            currentVideoNameSpan.textContent = videos[currentVideoIndex].replace('.mp4', ''); // Replace .mp4 extension
        }

        prevBtn.addEventListener('click', () => {
            currentVideoIndex = (currentVideoIndex - 1 + videos.length) % videos.length;
            updateVideo();
        });

        nextBtn.addEventListener('click', () => {
            currentVideoIndex = (currentVideoIndex + 1) % videos.length;
            updateVideo();
        });

        volumeDownBtn.addEventListener('click', () => {
            volume = Math.max(volume - 0.1, 0);
            videoElement.volume = volume;
        });

        volumeUpBtn.addEventListener('click', () => {
            volume = Math.min(volume + 0.1, 1);
            videoElement.volume = volume;
        });

        speedDownBtn.addEventListener('click', () => {
            playbackSpeed = Math.max(playbackSpeed - 0.1, 0.5);
            videoElement.playbackRate = playbackSpeed;
        });

        speedUpBtn.addEventListener('click', () => {
            playbackSpeed = Math.min(playbackSpeed + 0.1, 2);
            videoElement.playbackRate = playbackSpeed;
        });

        // Initialize video
        updateVideo();
    </script>
    {% include 'footer.html' %}
</body>

</html>
