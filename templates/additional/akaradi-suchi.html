<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ಅಕಾರಾದಿ ಸೂಚಿ</title>
    <link rel="stylesheet" href="/static/boostrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/boostrap/css/font-awesome-6.6.0-all.min.css">
    <script src="/static/jquery/jquery-3.7.1.js"></script>
    <script src="/static/boostrap/js/bootstrap.bundle.min.js"></script>
    <link href="/static/DataTables/datatables.min.css" rel="stylesheet">
    <script src="/static/DataTables/datatables.min.js"></script>
    <style>
        body {
            background-color: #FFDAB9;
            font-family: Arial, sans-serif;
        }
        .container {
            background-color: #FFE4B5;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .title {
            background-color: #FFDAB9;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            position: relative;
        }
        .back-button {
            position: absolute;
            top: 10px;
            right: 10px;
        }
        .alphabet-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .alphabet-grid span {
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 5px;
            background-color: #FFF;
            border: 1px solid #ddd;
        }
        .alphabet-grid span:hover {
            background-color: #f0f0f0;
        }
        .word-dropdown {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .word-table {
            border: 1px solid #dee2e6;
        }
        .footer {
            font-size: 12px;
            margin-top: 10px;
        }
        .form-select {
            background-color: #FFF;
            max-width: 300px;
        }
        #dictionaryTable thead th {
            cursor: pointer;
        }
        #dictionaryTable thead th:hover {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1 class="text-center mb-0">ಅಕಾರಾದಿ ಸೂಚಿ</h1>
            <button class="btn btn-sm btn-secondary back-button">ಹಿಂದಿನ ಪುಟಕ್ಕೆ</button>
        </div>
        
        <div class="alphabet-grid">
            <span>ಅ</span><span>ಆ</span><span>ಇ</span><span>ಈ</span><span>ಉ</span><span>ಊ</span><span>ಋ</span><span>ಎ</span><span>ಏ</span><span>ಐ</span><span>ಒ</span>
            <span>ಓ</span><span>ಔ</span><span>ಕ</span><span>ಖ</span><span>ಗ</span><span>ಘ</span><span>ಙ</span><span>ಚ</span><span>ಛ</span><span>ಜ</span><span>ಝ</span>
            <span>ಞ</span><span>ಟ</span><span>ಠ</span><span>ಡ</span><span>ಢ</span><span>ಣ</span><span>ತ</span><span>ಥ</span><span>ದ</span><span>ಧ</span>
            <span>ನ</span><span>ಪ</span><span>ಫ</span><span>ಬ</span><span>ಭ</span><span>ಮ</span><span>ಯ</span><span>ರ</span><span>ಲ</span><span>ವ</span>
            <span>ಶ</span><span>ಷ</span>
        </div>

        <div class="word-dropdown">
            <select id="wordDropdown" class="form-select">
                <option value="">ಎಲ್ಲಾ ಪದಗಳು</option>
                <option value="ಅವ್ಯಯ ಪದದ">ಅವ್ಯಯ ಪದದ</option>
                <option value="ಸಂಜ್ಞಾ ಪದದ">ಸಂಜ್ಞಾ ಪದದ</option>
                <option value="ಭಾವ ಪದದ">ಭಾವ ಪದದ</option>
                <option value="ಉಪಯೋಗ ಪದದ">ಉಪಯೋಗ ಪದದ</option>
                <option value="ವಿಶೇಷಣ ಪದದ">ವಿಶೇಷಣ ಪದದ</option>
            </select>
        </div>

        <div class="word-table">
            <table id="dictionaryTable" class="table table-striped">
                <thead>
                    <tr>
                        <th>ಪದ್ಯದ ಮೊದಲ ಸಾಲು</th>
                        <th>ಪರ್ವ</th>
                        <th>ಸಂಧಿಯ ಹೆಸರು</th>
                        <th>ಪದ್ಯದ ಸಂಖ್ಯೆ</th>
                    </tr>
                </thead>
                <tbody>
                <!-- Data will be populated here -->
                </tbody>
            </table>
        </div>

        <div class="footer text-center">
            ಸ್ಪಷ್ಟನೆ : ಪದದ ವಿವರಣೆ ಓದಲು ಪದವನ್ನು ಕ್ಲಿಕ್ ಮಾಡಿ, ಅಥವಾ ಪದದ ಮೇಲೆ ಮೌಸ್ ತನ್ನಿ.
        </div>
    </div>

    <!-- Modal for displaying padya details -->
    <div class="modal fade" id="padyaModal" tabindex="-1" aria-labelledby="padyaModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="padyaModalLabel">Padya Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p><strong>Padyafirstline:</strong> <span id="padyafirstline"></span></p>
                    <p><strong>Pathantar:</strong> <span id="pathantar"></span></p>
                    <p><strong>Gadya:</strong> <span id="gadya"></span></p>
                    <p><strong>Tippani:</strong> <span id="tippani"></span></p>
                    <p><strong>Artha:</strong> <span id="artha"></span></p>
                    <p><strong>Suchane:</strong> <span id="suchane"></span></p>
                    <p><strong>Padya:</strong> <span id="padya"></span></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>




<script>
$(document).ready(function() {
    // Initialize DataTable
    const table = $('#dictionaryTable').DataTable({
        "language": {
            "search": "ಹುಡುಕು:",
            "lengthMenu": "_MENU_ ಪದಗಳನ್ನು ತೋರಿಸು",
            "info": "_TOTAL_ ಪದಗಳಲ್ಲಿ _START_ ರಿಂದ _END_ ವರೆಗಿನ ಪದಗಳು",
            "paginate": {
                "first": "ಮೊದಲ",
                "last": "ಕೊನೆಯ",
                "next": "ಮುಂದಿನ",
                "previous": "ಹಿಂದಿನ"
            },
            "sortAscending": ": ಆರೋಹಣ ಕ್ರಮದಲ್ಲಿ ವಿಂಗಡಿಸಲು ಸಕ್ರಿಯಗೊಳಿಸಿ",
            "sortDescending": ": ಅವರೋಹಣ ಕ್ರಮದಲ್ಲಿ ವಿಂಗಡಿಸಲು ಸಕ್ರಿಯಗೊಳಿಸಿ"
        },
        "pageLength": 5,
        "lengthMenu": [5, 10, 25, 50],
        "ordering": true,
        "order": [[0, 'asc']],
        "columns": [
            { "data": "padyafirstline", "title": "ಪದ್ಯದ ಮೊದಲ ಸಾಲು" },
            { "data": "parva_name", "title": "ಪರ್ವ" },
            { "data": "sandhi_name", "title": "ಸಂಧಿಯ ಹೆಸರು" },
            { "data": "padya_number", "title": "ಪದ್ಯದ ಸಂಖ್ಯೆ" }
        ]
    });

    // Fetch data from Flask API and populate the table
    fetch('/akaradi-suchi/data')
        .then(response => response.json())
        .then(data => {
            console.log("Data received:", data);  // Verify the data format
            if (Array.isArray(data)) {
                table.clear().rows.add(data).draw();
            } else {
                console.error("Unexpected data format:", data);
            }
        })
        .catch(error => {
            console.error("Error fetching data:", error);
            // Handle error here, maybe show a message to the user
        });

    // Filter by dropdown
    $('#wordDropdown').on('change', function() {
        const selectedType = $(this).val();
        if (selectedType === 'ಎಲ್ಲಾ ಪದಗಳು') {
            table.column(1).search('').draw();
        } else {
            table.column(1).search(selectedType).draw();
        }
    });

    // Filter by alphabet
    $('.alphabet-grid span').on('click', function() {
        const letter = $(this).text();
        table.search(letter).draw();
    });


// Handle row click event to show modal
$('#dictionaryTable tbody').on('click', 'tr', function () {
    const rowData = table.row(this).data();
    if (rowData) {
        const parva = rowData.parva_id; // Adjust this if necessary
        const sandhi = rowData.sandhi_id; // Adjust this if necessary
        const padya = rowData.padya_number; // Adjust this if necessary

        // Construct the URL for the API call
        const apiUrl = `/api/padya/by_parva_sandhi_padya/${parva}/${sandhi}/${padya}`;

        // Show loading spinner
        $('#padyaModal .modal-body').html('<div class="spinner-border" role="status"><span class="sr-only">Loading...</span></div>');

        // Fetch details from the API
        fetch(apiUrl)
            .then(response => response.json())
            .then(data => {
                if (data) {
                    // Populate modal with data
                    $('#padyafirstline').text(data.padyafirstline || 'N/A');
                    $('#pathantar').text(data.pathantar || 'N/A');
                    $('#gadya').text(data.gadya || 'N/A');
                    $('#tippani').text(data.tippani || 'N/A');
                    $('#artha').text(data.artha || 'N/A');
                    $('#suchane').text(data.suchane || 'N/A');
                    $('#padya').text(data.padya || 'N/A');
                    
                    // Hide loading spinner and show modal
                    $('#padyaModal .modal-body').html(`
                        <p><strong>Padyafirstline:</strong> ${data.padyafirstline || 'N/A'}</p>
                        <p><strong>Pathantar:</strong> ${data.pathantar || 'N/A'}</p>
                        <p><strong>Gadya:</strong> ${data.gadya || 'N/A'}</p>
                        <p><strong>Tippani:</strong> ${data.tippani || 'N/A'}</p>
                        <p><strong>Artha:</strong> ${data.artha || 'N/A'}</p>
                        <p><strong>Suchane:</strong> ${data.suchane || 'N/A'}</p>
                        <p><strong>Padya:</strong> ${data.padya || 'N/A'}</p>
                    `);
                    $('#padyaModal').modal('show');
                } else {
                    console.error("No data returned from API");
                    // Show error message in modal
                    $('#padyaModal .modal-body').html('<p>Error: No data returned from the API.</p>');
                    $('#padyaModal').modal('show');
                }
            })
            .catch(error => {
                console.error("Error fetching padya details:", error);
                // Show error message in modal
                $('#padyaModal .modal-body').html('<p>Error fetching padya details. Please try again later.</p>');
                $('#padyaModal').modal('show');
            });
    }
});






    // Back button functionality
    $('.back-button').on('click', function() {
        alert('Navigating to previous page');
    });
});
</script>



</body>
</html>
