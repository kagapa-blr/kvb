<!DOCTYPE html>
<html lang="kn">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ಅಕಾರಾದಿ ಸೂಚಿ</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/font-awesome-6.6.0-all.min.css') }}" />
  <link href="{{ url_for('static', filename='DataTables/datatables.min.css') }}" rel="stylesheet" />

  <script src="{{ url_for('static', filename='jquery/jquery-3.7.1.js') }}"></script>
  <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
  <script src="{{ url_for('static', filename='DataTables/datatables.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/cdn/axios.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/additional/akaradi-suchi.js') }}"></script>

  <style>
    body {
      background-color: #ffdab9;
      font-family: Arial, sans-serif;
    }

    .container {
      background-color: #ffe4b5;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .title {
      background-color: #ffdab9;
      padding: 10px;
      border-radius: 5px;
      margin-bottom: 20px;
      position: relative;
    }

    .back-button {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    .alphabet-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .alphabet-grid span {
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 5px;
      background-color: #fff;
      border: 1px solid #ddd;
      user-select: none;
    }

    .alphabet-grid span:hover,
    .alphabet-grid span.active {
      background-color: #f0f0f0;
      border-color: #999;
    }

    .word-dropdown {
      margin-bottom: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .word-table {
      border: 1px solid #dee2e6;
      background: #fff;
    }

    .footer {
      font-size: 12px;
      margin-top: 10px;
    }

    .form-select {
      background-color: #fff;
      max-width: 300px;
    }

    #dictionaryTable thead th {
      cursor: pointer;
    }

    #dictionaryTable thead th:hover {
      background-color: #f8f9fa;
    }

    .modal-dialog {
      max-width: 90%;
      margin: 1.75rem auto;
    }

    .modal-content {
      border-radius: 8px;
    }

    .modal-header,
    .modal-body,
    .modal-footer {
      padding: 20px;
    }

    .modal-header {
      background-color: #343a40;
      color: #fff;
      border-bottom: 1px solid #dee2e6;
    }

    .modal-body {
      background-color: #f8f9fa;
      color: #495057;
    }

    .spinner-border {
      width: 3rem;
      height: 3rem;
    }

    #loadingOverlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: inherit;
      margin: 0;
    }
  </style>
</head>

<body>
  {% include 'navbar.html' %}

  <div id="loadingOverlay">
    <div class="spinner-border text-dark" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div class="container">
    <div class="title">
      <h1 class="text-center mb-0">ಅಕಾರಾದಿ ಸೂಚಿ</h1>
      <button class="btn btn-sm btn-secondary back-button" type="button">
        ಹಿಂದಿನ ಪುಟಕ್ಕೆ
      </button>
    </div>

    <div class="alphabet-grid">
      <span>ಅ</span><span>ಆ</span><span>ಇ</span><span>ಈ</span><span>ಉ</span><span>ಊ</span><span>ಋ</span><span>ಎ</span><span>ಏ</span><span>ಐ</span><span>ಒ</span>
      <span>ಓ</span><span>ಔ</span><span>ಕ</span><span>ಖ</span><span>ಗ</span><span>ಘ</span><span>ಙ</span><span>ಚ</span><span>ಛ</span><span>ಜ</span><span>ಝ</span>
      <span>ಞ</span><span>ಟ</span><span>ಠ</span><span>ಡ</span><span>ಢ</span><span>ಣ</span><span>ತ</span><span>ಥ</span><span>ದ</span><span>ಧ</span>
      <span>ನ</span><span>ಪ</span><span>ಫ</span><span>ಬ</span><span>ಭ</span><span>ಮ</span><span>ಯ</span><span>ರ</span><span>ಲ</span><span>ವ</span>
      <span>ಶ</span><span>ಷ</span>
    </div>

    <div class="word-dropdown">
      <select id="parvaDropdown" class="form-select">
        <option value="">ಎಲ್ಲಾ ಪರ್ವಗಳು</option>
      </select>
    </div>

    <div class="word-table">
      <table id="dictionaryTable" class="table table-striped mb-0">
        <thead>
          <tr>
            <th>ಪದ್ಯದ ಮೊದಲ ಸಾಲು</th>
            <th>ಪರ್ವ ಸಂಖ್ಯೆ</th>
            <th>ಸಂಧಿ ಸಂಖ್ಯೆ</th>
            <th>ಪದ್ಯದ ಸಂಖ್ಯೆ</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="footer text-center">
      <strong>ಸೂಚನೆ:</strong>
      ಪದ್ಯದ ವಿವರಣೆ ಓದಲು ಪದ್ಯವನ್ನು ಕ್ಲಿಕ್ ಮಾಡಿ.
    </div>
  </div>

  <div class="modal fade" id="padyaModal" tabindex="-1" aria-labelledby="padyaModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="padyaModalLabel">ಪದ್ಯದ ವಿವರಣೆ</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="text-center">
            <div class="spinner-border" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ಮುಚ್ಚಿ</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
