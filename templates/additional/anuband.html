<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Viewer</title>

  <link rel=\"stylesheet\" href=\"{{ url_for('static', filename='css/style.css' ) }}\">
  <link rel="stylesheet" href="{{ url_for('static', filename='boostrap/css/bootstrap.min.css') }}">
  <script src="{{ url_for('static', filename='jquery/jquery-3.7.1.min.js') }}"></script>
  <script src="{{ url_for('static', filename='boostrap/js/bootstrap.bundle.min.js') }}"></script>


  <style>
    body {
      background-color: #FFE4B5;
    }

    .btn-warning.active {
      background-color: #FFA500;
      color: black;
    }

    .btn-warning {
      background-color: #FFD700;
      color: black;
      font-size: 1.125rem;
      /* Larger font size */
      padding: 0.5rem 1rem;
      /* Larger padding */
    }

    .btn-warning:hover {
      background-color: #FFA500;
      color: black;
    }

    .btn-container {
      margin-bottom: 1.5rem;
      /* Space below the buttons */
    }

    .content {
      background-color: white;
      border: 2px solid black;
      border-radius: 0.5rem;
      padding: 1rem;
      height: 30rem;
      /* Increased height */
      overflow-y: auto;
    }

    h1 {
      background-color: #FFA500;
      color: black;
      padding: 0.5rem;
      margin-bottom: 1.5rem;
      /* Space below the header */
      border-radius: 0.5rem;
    }
  </style>
</head>

<body>
  {% include 'navbar.html' %}
  <div class="container my-4">
    <h1 class="text-center">ಅನುಬಂಧ</h1>

    <div class="d-flex overflow-auto btn-container">
      <button class="btn btn-warning me-2 active" data-target="tab1">ಕೋಶದ ನಾಂದಿ</button>
      <button class="btn btn-warning me-2" data-target="tab2">ಕುಮಾರ ವ್ಯಾಸ ಕೃತಿ ಕನ್ನಡ ಭಾಷೆ</button>
      <button class="btn btn-warning me-2" data-target="tab3">ಪದವಿಭಾಗ-ಪದಕೋಶ</button>
      <button class="btn btn-warning me-2" data-target="tab4">ಭಾಷಾ ವಿಜ್ಞಾನದ</button>
      <button class="btn btn-warning me-2" data-target="tab5">ವ್ಯಾಕರಣಾಂಗಗಳು</button>
      <button class="btn btn-warning me-2" data-target="tab6">ಸೂಚನಾ ಪಂಜರಗಳು</button>
    </div>

    <div class="content" id="tab-content">
      <!-- Content will be injected here by JavaScript -->
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const tabs = {
        tab1: 'ಕೋಶದ ನಾಂದಿ ವಿಷಯ ಇಲ್ಲಿದೆ.',
        tab2: 'ಕುಮಾರ ವ್ಯಾಸ ಕೃತಿ ಕನ್ನಡ ಭಾಷೆ ವಿಷಯ ಇಲ್ಲಿದೆ.',
        tab3: 'ಪದವಿಭಾಗ-ಪದಕೋಶ ವಿಷಯ ಇಲ್ಲಿದೆ.',
        tab4: 'ಭಾಷಾ ವಿಜ್ಞಾನದ ವಿಷಯ ಇಲ್ಲಿದೆ.',
        tab5: 'ವ್ಯಾಕರಣಾಂಗಗಳು ವಿಷಯ ಇಲ್ಲಿದೆ.',
        tab6: 'ಸೂಚನಾ ಪಂಜರಗಳು ವಿಷಯ ಇಲ್ಲಿದೆ.'
      };

      const buttons = document.querySelectorAll('.btn');
      const contentDiv = document.getElementById('tab-content');

      buttons.forEach(button => {
        button.addEventListener('click', () => {
          const targetId = button.getAttribute('data-target');

          buttons.forEach(btn => btn.classList.remove('active'));
          button.classList.add('active');

          contentDiv.textContent = tabs[targetId];
        });
      });

      // Set default content
      document.querySelector('.btn[data-target="tab1"]').click();
    });
  </script>


  {% include 'footer.html' %}
</body>

</html>
