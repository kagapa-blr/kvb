<!DOCTYPE html>
<html lang="kn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ಕರ್ನಾಟ ಭಾರತ ಕಥಾ ಮಂಜರಿ</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/newkavya.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/font-awesome-6.6.0-all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='jquery/jquery-3.7.1.min.js') }}"></script>
    <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.bundle.min.js') }}"></script>
    <!-- Axios for HTTP requests (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- REST Client & Endpoints (required by kavya_process.js) -->
    <script src="{{ url_for('static', filename='js/restclient.js') }}"></script>
    <script src="{{ url_for('static', filename='js/endpoints.js') }}"></script>
    <!-- Application Scripts -->
    <script src="{{ url_for('static', filename='js/kavya_process.js') }}"></script>
    <script src="{{ url_for('static', filename='js/additional-buttons.js') }}"></script>
</head>

<body>
    {% include 'navbar.html' %}
    <div class="container-fluid main-container">
        <h3 class="header">ಕರ್ನಾಟ ಭಾರತ ಕಥಾ ಮಂಜರಿ</h3>
        <div class="row">
            <div class="col-md-9">
                <div class="row mb-3">
                    <div class="col-md-4 d-flex align-items-center">
                        <label for="parvaDropdown" class="me-2">ಪರ್ವ:</label>
                        <select id="parvaDropdown" class="form-select" style="width: auto;">
                            <!-- <option value="">ಪರ್ವ ಆಯ್ಕೆಮಾಡಿ</option> -->
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-center">
                        <label for="sandhiDropdown" class="me-2">ಸಂಧಿ:</label>
                        <select id="sandhiDropdown" class="form-select" disabled style="width: auto;">
                            <!-- <option value="">ಸಂಧಿ ಆಯ್ಕೆಮಾಡಿ</option> -->
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-center">
                        <label for="padyaNumberDropdown" class="me-2">ಪದ್ಯ:</label>
                        <div class="d-flex align-items-center">
                            <button id="prevPadya" class="btn btn-outline-secondary me-2">
                                <i class="fa fa-chevron-left"></i>
                            </button>
                            <select id="padyaNumberDropdown" class="form-select" disabled style="width: auto;">
                                <!-- <option value="">ಪದ್ಯ ಸಂಖ್ಯೆಯನ್ನು ಆಯ್ಕೆಮಾಡಿ</option> -->
                            </select>
                            <button id="nextPadya" class="btn btn-outline-secondary ms-2">
                                <i class="fa fa-chevron-right"></i>
                            </button>
                        </div>
                    </div>


                </div>

                <!-- Audio Player - Perfect JS Integration -->
                <div class="audio-section mb-2">

                    <!-- Audio Player -->
                    <div class="audio-player-container mb-2">
                        <label class="form-label mb-2 d-block fw-bold" style="font-size: 1.05rem; color: #8B4513;">
                            <i class="fa fa-play-circle me-2" style="color: #8B0000;"></i>ಗಮಕವಾಚನ (ಆಡಿಯೋ)
                        </label>

                        <audio id="audio" controls class="w-100">
                            <source id="audioSource" src="" type="audio/mpeg" />
                        </audio>
                    </div>

                    <!-- Gamaka Metadata -->
                    <div class="card audio-details-card shadow-sm border-0">
                        <div class="card-body py-3">

                            <div class="row align-items-center">

                                <!-- Singer Photo -->
                                <div class="col-auto text-center singer-photo-col">
                                    <div class="photo-container">
                                        <img id="singerPhoto" src="" alt="ಗಮಕ ವಾಚಕರು" class="rounded-circle" style="
                            width: 140px;
                            height: 140px;
                            object-fit: cover;
                            border: 3px solid #8B4513;
                            box-shadow: 0 2px 8px rgba(139, 69, 19, 0.3);
                         ">
                                    </div>
                                </div>

                                <!-- Singer + Raga Info -->
                                <div class="col singer-info-col">
                                    <!-- Singer Name -->
                                    <div class="mb-3">
                                        <div class="singer-raga-label">
                                            <i class="fa fa-user-circle" style="color: #8B0000;"></i>ಗಮಕ ವಾಚಕರು
                                        </div>
                                        <div id="singerName" class="fw-bold fs-5"
                                            style="color: #8B4513; margin-top: 4px; font-size: 1.1rem !important;">
                                        </div>
                                    </div>

                                    <!-- Raga -->
                                    <div>
                                        <div class="singer-raga-label">
                                            <i class="fa fa-music" style="color: #8B0000;"></i>ರಾಗ
                                        </div>
                                        <div id="ragaName" class="fw-bold mt-2" style="
                                font-size: 1.3rem;
                                color: #8B0000;
                                letter-spacing: 1px;
                                padding: 6px 10px;
                                background: rgba(255, 192, 203, 0.2);
                                border-radius: 6px;
                                display: inline-block;
                             ">
                                        </div>
                                    </div>

                                </div>

                            </div>

                        </div>
                    </div>

                </div>



                <div class="content-box" style="width: 50%; margin: 0 auto 20px auto; text-align: left;">
                    <span class="label">ಪದ್ಯ:</span>
                    <div class="padya editable"></div>
                </div>


                <div class="row">
                    <div class="col-md-6">
                        <div class="content-box">
                            <span class="label">ಪಾಠಾಂತರ:</span>
                            <div class="pathantar editable"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="content-box">
                            <span class="label">ಗದ್ಯ:</span>
                            <div class="gadya editable"></div>
                        </div>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-md-6">
                        <div class="content-box">
                            <span class="label">ಟಿಪ್ಪಣಿ:</span>
                            <div class="tippani editable"></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="content-box">
                            <span class="label">ಅರ್ಥ:</span>
                            <div class="artha editable"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="side-menu">
                    <div class="button-list">
                        <button class="btn btn-primary">ಹೆಚ್ಚಿನ ಶೋಧನೆ</button>
                        <button class="btn btn-primary">ಅಕಾರಾದಿ ಸೂಚಿ</button>
                        <button class="btn btn-primary">ಲೇಖನ ಸೂಚಿ</button>
                        <button class="btn btn-primary">ಗಾದೆಗಳ ಸೂಚಿ</button>
                        <button class="btn btn-primary">ಅರ್ಥ ಕೋಶ</button>
                        <button class="btn btn-primary">ವಿಷಯ ಪರಿವಿಡಿ</button>
                        <button class="btn btn-primary">ಗಮಕ</button>
                        <button class="btn btn-primary">ಅನುಬಂಧ</button>
                        <button class="btn btn-primary">ಟಿಪ್ಪಣಿ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>

    {% include 'footer.html' %}

    <!-- Search Modal -->
    <div class="modal fade" id="modal1" tabindex="-1" aria-labelledby="modal1Label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-top modal-dialog-scrollable modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal1Label">ಹೆಚ್ಚಿನ ಶೋಧನೆ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <h3 class="text-center my-4">ಶಬ್ದದಿಂದ ಹುಡುಕು</h3>
                    <form id="search-form" class="mb-4">
                        <div class="input-group">
                            <input id="search-input" type="text" class="form-control"
                                placeholder="ಹುಡುಕಲು ಶಬ್ದವನ್ನು ನಮೂದಿಸಿ..." required>
                            <button class="btn btn-outline-secondary" type="submit">ಹುಡುಕು</button>
                        </div>
                    </form>
                    <ul id="search-results" class="list-group">
                        <!-- ಶೋಧದ ಫಲಿತಾಂಶಗಳನ್ನು JavaScript ಮೂಲಕ ಅಳವಡಿಸಲಾಗುತ್ತದೆ -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Akaradi Suchi Modal -->
    <div class="modal fade" id="modal2" tabindex="-1" aria-labelledby="modal2Label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal2Label">ಅಕಾರಾದಿ ಸೂಚಿ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Content loaded by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Lekhana Suchi Modal -->
    <div class="modal fade" id="modal3" tabindex="-1" aria-labelledby="modal3Label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal3Label">ಲೇಖನ ಸೂಚಿ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Content loaded by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Gadegal Suchi Modal -->
    <div class="modal fade" id="modal4" tabindex="-1" aria-labelledby="modal4Label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal4Label">ಗಾದೆಗಳ ಸೂಚಿ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Content loaded by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Artha Kosha Modal -->
    <div class="modal fade" id="modal5" tabindex="-1" aria-labelledby="modal5Label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal5Label">ಅರ್ಥ ಕೋಶ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Content loaded by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Vishaya Parividi Modal -->
    <div class="modal fade" id="modal6" tabindex="-1" aria-labelledby="modal6Label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal6Label">ವಿಷಯ ಪರಿವಿಡಿ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Content loaded by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Gamaka Modal -->
    <div class="modal fade" id="modal7" tabindex="-1" aria-labelledby="modal7Label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal7Label">ಗಮಕ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Content loaded by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Anuband Modal -->
    <div class="modal fade" id="modal8" tabindex="-1" aria-labelledby="modal8Label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal8Label">ಅನುಬಂಧ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Content loaded by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <!-- Tippani Modal -->
    <div class="modal fade" id="modal9" tabindex="-1" aria-labelledby="modal9Label" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal9Label">ಟಿಪ್ಪಣಿ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Content loaded by JavaScript -->
                </div>
            </div>
        </div>
    </div>
</body>

</html>
