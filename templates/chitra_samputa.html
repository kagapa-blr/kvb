<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ಚಿತ್ರ ಸಂಪುಟ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='boostrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='boostrap/js/bootstrap.bundle.min.js') }}"></script>


    <style>
        body {
            background-color: #f8f9fa;
        }

        .viewer-container {
            max-width: 1200px;
            margin: 2rem auto;
            background-color: #faca93;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        .navigation-controls {
            background-color: #f1f3f5;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .image-container {
            height: 70vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: #e9ecef;
        }

        #image {
            max-width: 100%;
            max-height: 100%;
            transition: transform 0.3s ease-in-out;
        }

        .zoom-controls {
            background-color: #f1f3f5;
            padding: 1rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .btn-control {
            font-size: 1.2rem;
            padding: 0.5rem 1rem;
        }

        .image-counter {
            font-size: 1.2rem;
            font-weight: bold;
            color: #495057;
        }

        .image-filename {
            font-size: 1.1rem;
            color: #6c757d;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}
    <div class="container-fluid">
        <div class="viewer-container">
            <div class="navigation-controls">
                <button id="prevBtn" class="btn btn-primary btn-control">
                    <i class="fas fa-chevron-left"></i> Previous
                </button>
                <span class="image-counter">Image <span id="currentImage">1</span> of <span
                        id="totalImages">5</span></span>
                <button id="nextBtn" class="btn btn-primary btn-control">
                    Next <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <div class="image-container">
                <img id="image" src="{{ url_for('get_image', filename=images[0]) }}" alt="Viewer Image">
            </div>
            <div class="image-filename" id="imageFilename">ಹೆಸರು: {{ images[0].replace('.jpg','') }}</div>
            <div class="zoom-controls">
                <button id="zoomOutBtn" class="btn btn-secondary btn-control">
                    <i class="fas fa-search-minus"></i> Zoom Out
                </button>
                <button id="zoomInBtn" class="btn btn-secondary btn-control">
                    <i class="fas fa-search-plus"></i> Zoom In
                </button>
            </div>
        </div>
    </div>
    <script>
        const images = {{ images| tojson | safe }};  // Fetching images dynamically from the backend
        const imageElement = document.getElementById('image');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const zoomInBtn = document.getElementById('zoomInBtn');
        const zoomOutBtn = document.getElementById('zoomOutBtn');
        const currentImageSpan = document.getElementById('currentImage');
        const totalImagesSpan = document.getElementById('totalImages');
        const imageFilename = document.getElementById('imageFilename');

        let currentImageIndex = 0;
        let zoomLevel = 1;

        totalImagesSpan.textContent = images.length;

        function updateImage() {
            imageElement.src = `{{ url_for('get_image', filename='') }}${images[currentImageIndex]}`;

            // Remove the extension from the filename
            const imageNameWithoutExtension = images[currentImageIndex].split('.').slice(0, -1).join('.');

            imageFilename.textContent = `ಹೆಸರು: ${imageNameWithoutExtension}`;
            currentImageSpan.textContent = currentImageIndex + 1;
            resetZoom();
        }


        function resetZoom() {
            zoomLevel = 1;
            imageElement.style.transform = `scale(${zoomLevel})`;
        }

        prevBtn.addEventListener('click', () => {
            currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
            updateImage();
        });

        nextBtn.addEventListener('click', () => {
            currentImageIndex = (currentImageIndex + 1) % images.length;
            updateImage();
        });

        zoomInBtn.addEventListener('click', () => {
            zoomLevel = Math.min(zoomLevel + 0.1, 3);
            imageElement.style.transform = `scale(${zoomLevel})`;
        });

        zoomOutBtn.addEventListener('click', () => {
            zoomLevel = Math.max(zoomLevel - 0.1, 0.5);
            imageElement.style.transform = `scale(${zoomLevel})`;
        });
    </script>
    {% include 'footer.html' %}
</body>

</html>
