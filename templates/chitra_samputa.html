<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chitra Samputa</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="/static/boostrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/chitra_samputa.css">
    <!-- jQuery -->
    <script src="/static/jquery/jquery-3.7.1.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="/static/js/chitra_samputa.js"></script>
    <script src="/static/boostrap/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    {% include 'navbar.html' %}
    <div class="container mt-4">
        <h1>Image Viewer</h1>
        <div class="image-viewer">
            <button id="prevBtn" class="btn btn-primary">Previous</button>
            <img id="image" src="{{ url_for('get_image', filename=images[0]) }}" class="img-fluid" alt="Image">
            <button id="nextBtn" class="btn btn-primary">Next</button>
        </div>
        <div class="mt-3">
            <button id="zoomInBtn" class="btn btn-secondary">Zoom In</button>
            <button id="zoomOutBtn" class="btn btn-secondary">Zoom Out</button>
        </div>
    </div>
</body>
</html>
